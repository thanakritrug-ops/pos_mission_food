    <script>
    // ==================== INLINE SERVICE WORKER ====================
    (function() {
        if (!('serviceWorker' in navigator)) return;

        const CACHE = 'pos-cafe-v1';
        const URLS = [
            'https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap',
            'https://fonts.gstatic.com',
            'https://cdn.tailwindcss.com',
            'https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js',
        ];

        const swCode = `
const CACHE_NAME = '${CACHE}';
const PRECACHE = ${JSON.stringify(URLS)};

self.addEventListener('install', e => {
    e.waitUntil(
        caches.open(CACHE_NAME).then(cache => {
            return Promise.allSettled(PRECACHE.map(url => cache.add(url).catch(() => {})));
        }).then(() => self.skipWaiting())
    );
});

self.addEventListener('activate', e => {
    e.waitUntil(
        caches.keys().then(keys =>
            Promise.all(keys.filter(k => k !== CACHE_NAME).map(k => caches.delete(k)))
        ).then(() => self.clients.claim())
    );
});

self.addEventListener('fetch', e => {
    if (e.request.method !== 'GET') return;
    const url = e.request.url;
    // Only intercept CDN / font requests — let local requests pass through normally
    const isCDN = url.includes('cdn.tailwindcss') || url.includes('cdnjs.cloudflare') ||
                  url.includes('fonts.googleapis') || url.includes('fonts.gstatic');
    if (!isCDN) return;

    e.respondWith(
        caches.match(e.request).then(cached => {
            if (cached) return cached;
            return fetch(e.request).then(res => {
                if (res && res.status === 200) {
                    const clone = res.clone();
                    caches.open(CACHE_NAME).then(cache => cache.put(e.request, clone));
                }
                return res;
            }).catch(() => cached || new Response('', { status: 503 }));
        })
    );
});
`;

        const blob = new Blob([swCode], { type: 'application/javascript' });
        const swUrl = URL.createObjectURL(blob);

        navigator.serviceWorker.register(swUrl, { scope: '/' })
            .then(reg => {
                console.log('[POS SW] ลงทะเบียน Service Worker สำเร็จ — ใช้ออฟไลน์ได้หลังโหลดครั้งแรก');
                reg.addEventListener('updatefound', () => {
                    const w = reg.installing;
                    w.addEventListener('statechange', () => {
                        if (w.state === 'installed' && navigator.serviceWorker.controller) {
                            console.log('[POS SW] อัปเดต cache เรียบร้อย');
                        }
                    });
                });
            })
            .catch(err => console.warn('[POS SW] Service Worker ไม่ทำงาน:', err));
    })();
    </script>

function updateOnlineStatus() {
    let b=document.getElementById('online-badge');
    if(!b){b=document.createElement('div');b.id='online-badge';document.body.appendChild(b);}
    b.className=navigator.onLine?'offline-badge online-badge':'offline-badge';
    b.textContent=navigator.onLine?'🟢 ออนไลน์':'🔴 ออฟไลน์';
}
window.addEventListener('online',updateOnlineStatus);
window.addEventListener('offline',updateOnlineStatus);
window.addEventListener('load',updateOnlineStatus);

// ==================== AUTH MANAGER ====================
class AuthManager {
    constructor() {
        this._defaultUsers = [
            {id:1, username:'owner', password:'owner1234', role:'owner', name:'เจ้าของร้าน'},
            {id:2, username:'manager', password:'mgr1234', role:'manager', name:'ผู้จัดการ'},
            {id:3, username:'staff', password:'staff1234', role:'staff', name:'พนักงานขาย'},
        ];
        this.users = JSON.parse(localStorage.getItem('pos_users')) || this._defaultUsers;
        this.currentUser = JSON.parse(sessionStorage.getItem('pos_user')) || null;
    }
    login(username, password) {
        const user = this.users.find(u=>u.username===username && u.password===password && u.active!==false);
        if(user) { this.currentUser = user; sessionStorage.setItem('pos_user', JSON.stringify(user)); return user; }
        return null;
    }
    logout() { this.currentUser = null; sessionStorage.removeItem('pos_user'); }
    isLoggedIn() { return !!this.currentUser; }
    can(action) {
        if(!this.currentUser) return false;
        const perms = {
            owner:   ['pos','reports','all_reports','settings','demo','clear','manage_users','manage_products','supabase','edit_orders'],
            manager: ['pos','reports','all_reports','edit_orders','manage_products'],
            staff:   ['pos','reports','own_history','edit_orders'],
        };
        return (perms[this.currentUser.role]||[]).includes(action);
    }
    get role() { return this.currentUser?.role || null; }
    get name() { return this.currentUser?.name || ''; }
    saveUsers() { localStorage.setItem('pos_users', JSON.stringify(this.users)); }
    addUser(u) { u.id = Date.now(); this.users.push(u); this.saveUsers(); }
    updateUser(id, data) { const i=this.users.findIndex(u=>u.id===id); if(i>=0){this.users[i]={...this.users[i],...data};this.saveUsers();} }
    deleteUser(id) { this.users=this.users.filter(u=>u.id!==id); this.saveUsers(); }
}

    handleLogoFile(file) {
        if (file.size > 10*1024*1024) { alert('❌ ไฟล์ใหญ่เกิน 10MB'); return; }
        const reader = new FileReader();
        reader.onload = e => {
            this._pendingLogo = e.target.result;
            const zone = document.getElementById('logo-drop-zone');
            if (zone) zone.innerHTML = `<img src="${e.target.result}" style="max-height:120px;max-width:100%;border-radius:12px;margin:auto">`;
        };
        reader.readAsDataURL(file);
    }

    getProductImage(productId) { return this.productImages[productId] || null; }
    // Compress image before storing
    compressImage(dataUrl, maxWidth=400, quality=0.6) {
        return new Promise(resolve => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                let w = img.width, h = img.height;
                if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                resolve(canvas.toDataURL('image/jpeg', quality));
            };
            img.src = dataUrl;
        });
    }

    setProductImage(productId, dataUrl) {
        this.productImages[productId] = dataUrl;
        try { localStorage.setItem('pos_product_images', JSON.stringify(this.productImages)); } catch(e) { alert('⚠️ หน่วยความจำเต็ม ไม่สามารถบันทึกรูปภาพได้'); }
    }
    removeProductImage(productId) {
        delete this.productImages[productId];
        localStorage.setItem('pos_product_images', JSON.stringify(this.productImages));
    }

    emojiImg(product, size=44) {
        // product can be {id, image} or just a string (emoji/url)
        const pid = typeof product === 'object' ? product.id : null;
        const src = typeof product === 'object' ? product.image : product;
        // Check custom image first
        const custom = pid ? this.getProductImage(pid) : null;
        if(custom) {
            // base64 always works; URL only when online
            if(custom.startsWith('data:') || navigator.onLine) {
                return `<img src="${custom}" width="${size}" height="${size}" style="object-fit:cover;border-radius:8px;" onerror="this.style.display='none';this.nextSibling.style.display='inline-flex'"><span style="display:none;align-items:center;justify-content:center;width:${size}px;height:${size}px;font-size:${Math.round(size*.6)}px">${src}</span>`;
            }
        }
        // URL emoji
        if(typeof src==='string'&&(src.startsWith('http')||src.startsWith('data:'))) {
            if(!navigator.onLine) {
                // offline: show emoji fallback
                const p = this.products.find(p=>p.id===pid);
                return `<span style="display:inline-flex;align-items:center;justify-content:center;width:${size}px;height:${size}px;font-size:${Math.round(size*.6)}px">${p?.image||'🍽️'}</span>`;
            }
            return `<img src="${src}" width="${size}" height="${size}" style="object-fit:cover;border-radius:8px;">`;
        }
        return `<span style="display:inline-flex;align-items:center;justify-content:center;width:${size}px;height:${size}px;font-size:${Math.round(size*.6)}px">${src}</span>`;
    }

    getISOWeek(d) { const date=new Date(d);date.setHours(0,0,0,0);date.setDate(date.getDate()+3-(date.getDay()+6)%7);const w1=new Date(date.getFullYear(),0,4);const n=1+Math.round(((date-w1)/86400000-3+(w1.getDay()+6)%7)/7);return`${date.getFullYear()}-W${String(n).padStart(2,'0')}`; }
    getWeekRange(s){const[y,w]=s.split('-W').map(Number);const j=new Date(y,0,4);const st=new Date(j);st.setDate(j.getDate()-(j.getDay()||7)+1+(w-1)*7);const e=new Date(st);e.setDate(st.getDate()+6);return{start:st,end:e};}
    getWeekLabel(s){const{start:s2,end:e}=this.getWeekRange(s);return`${s2.toLocaleDateString('th-TH',{day:'numeric',month:'short'})} - ${e.toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'numeric'})}`;}

    // ==================== DATA STORAGE ====================
    loadOrders() {
        this._dbReady=false;
        const req=indexedDB.open('POSCafeDB',1);
        req.onupgradeneeded=(e)=>{const db=e.target.result;if(!db.objectStoreNames.contains('orders'))db.createObjectStore('orders',{keyPath:'id'});};
        req.onsuccess=(e)=>{this._db=e.target.result;this._dbReady=true;
            const tx=this._db.transaction('orders','readonly');const s=tx.objectStore('orders');const g=s.getAll();
            g.onsuccess=()=>{if(g.result&&g.result.length>0){this.state.orders=g.result.sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));this.render();}
                else{try{const old=localStorage.getItem('pos_orders');if(old){const p=JSON.parse(old);if(p.length>0){this.state.orders=p;this._saveBatch(p);localStorage.removeItem('pos_orders');}}}catch(e){}this.render();}};
        };
        req.onerror=()=>{try{const s=localStorage.getItem('pos_orders');this.state.orders=s?JSON.parse(s):[];}catch(e){this.state.orders=[];}this.render();};
    }
    _slimOrder(o) { return {id:o.id,timestamp:o.timestamp,items:o.items.map(i=>{const s={name:i.name,price:i.price,cost:i.cost,quantity:i.quantity,category:i.category};if(i.originalName)s.originalName=i.originalName;if(i.sweetness!==undefined)s.sweetness=i.sweetness;if(i.extraShots)s.extraShots=i.extraShots;if(i.isDrink)s.isDrink=true;return s;}),subtotal:o.subtotal,totalCost:o.totalCost,discount:o.discount,vat:o.vat,total:o.total,profit:o.profit,staffId:o.staffId||'',staffName:o.staffName||'',paymentMethod:o.paymentMethod||'cash'}; }
    saveOrders() {
        if(this._dbReady&&this._db){try{const tx=this._db.transaction('orders','readwrite');tx.objectStore('orders').put(this._slimOrder(this.state.orders[0]));}catch(e){}}
        else{try{localStorage.setItem('pos_orders',JSON.stringify(this.state.orders.map(o=>this._slimOrder(o))));}catch(e){alert('⚠️ พื้นที่เก็บข้อมูลเต็ม กรุณา Export ก่อน');}}
    }
    _saveBatch(orders){if(!this._dbReady||!this._db)return;const slim=orders.map(o=>this._slimOrder(o));let idx=0;const save=()=>{if(idx>=slim.length)return;const tx=this._db.transaction('orders','readwrite');const st=tx.objectStore('orders');const end=Math.min(idx+500,slim.length);for(let i=idx;i<end;i++)st.put(slim[i]);idx=end;tx.oncomplete=save;};save();}
    _clearIDB(){if(this._dbReady&&this._db){const tx=this._db.transaction('orders','readwrite');tx.objectStore('orders').clear();}try{localStorage.removeItem('pos_orders');}catch(e){}}
    deleteOrderById(id){
        if(this._dbReady&&this._db){try{const tx=this._db.transaction('orders','readwrite');tx.objectStore('orders').delete(id);}catch(e){}}
        else{try{localStorage.setItem('pos_orders',JSON.stringify(this.state.orders.map(o=>this._slimOrder(o))));}catch(e){}}
    }
    updateOrderById(o){
        if(this._dbReady&&this._db){try{const tx=this._db.transaction('orders','readwrite');tx.objectStore('orders').put(this._slimOrder(o));}catch(e){}}
        else{try{localStorage.setItem('pos_orders',JSON.stringify(this.state.orders.map(x=>this._slimOrder(x))));}catch(e){}}
    }

    // ==================== SUPABASE ====================
    // ==================== SUPABASE ENGINE ====================
    async _supaFetch(path, options={}) {
        const url=this.state.supabaseUrl, key=this.state.supabaseKey;
        if(!url||!key) return null;
        try {
            const res=await fetch(`${url}/rest/v1/${path}`,{...options,headers:{'Content-Type':'application/json','apikey':key,'Authorization':`Bearer ${key}`,...(options.headers||{})}});
            if(!res.ok){console.warn('[Supa]',path,res.status,await res.text().catch(()=>'')); return null;}
            if(options.method&&options.method!=='GET') return true;
            return await res.json();
        } catch(e){console.warn('[Supa] fetch error',e); return null;}
    }

    async syncToSupabase(order) {
        if(!this.state.supabaseUrl||!this.state.supabaseKey||!navigator.onLine) return;
        await this._supaFetch('orders',{
            method:'POST',
            headers:{'Prefer':'resolution=merge-duplicates'},
            body:JSON.stringify({id:order.id,timestamp:order.timestamp,items:order.items,subtotal:order.subtotal,total_cost:order.totalCost,discount:order.discount,vat:order.vat,total:order.total,profit:order.profit,staff_id:order.staffId||'',staff_name:order.staffName||'',payment_method:order.paymentMethod||'cash'})
        });
    }

    async deleteOrderFromSupabase(id) {
        await this._supaFetch(`orders?id=eq.${id}`,{method:'DELETE'});
    }

    async _supaUpsertConfig(key,value) {
        const v=typeof value==='string'?value:JSON.stringify(value);
        return this._supaFetch('pos_config',{
            method:'POST',
            headers:{'Prefer':'resolution=merge-duplicates'},
            body:JSON.stringify({key,value:v,updated_at:new Date().toISOString()})
        });
    }

    async syncConfigToSupabase(key,value) {
        if(!this.state.supabaseUrl||!this.state.supabaseKey||!navigator.onLine) return;
        await this._supaUpsertConfig(key,value);
    }

    async loadFromSupabase() {
        if(!this.state.supabaseUrl||!this.state.supabaseKey||!navigator.onLine) return;
        console.log('[Supa] กำลังโหลดข้อมูลจาก Supabase...');

        // Load config (products, users, settings, shop info)
        const cfg=await this._supaFetch('pos_config?select=key,value');
        if(cfg) {
            for(const row of cfg) {
                try {
                    if(row.key==='products'){const p=JSON.parse(row.value);if(p&&p.length>0){this.products=p;localStorage.setItem('pos_products_custom',row.value);}}
                    else if(row.key==='users'){const u=JSON.parse(row.value);if(u&&u.length>0){this.auth.users=u;localStorage.setItem('pos_users',row.value);}}
                    else if(row.key==='shop_name'){this.shopName=row.value;localStorage.setItem('pos_shop_name',row.value);}
                    else if(row.key==='shop_logo'&&row.value){this.shopLogo=row.value;localStorage.setItem('pos_shop_logo',row.value);}
                    else if(row.key==='google_sheet_url'){this.state.googleSheetUrl=row.value;localStorage.setItem('googleSheetUrl',row.value);}
                    else if(row.key==='auto_export_sheets'){this.state.autoExportSheets=row.value==='true';localStorage.setItem('autoExportSheets',row.value);}
                } catch(e){}
            }
        }

        // Load orders from Supabase
        const rows=await this._supaFetch('orders?select=*&order=timestamp.desc&limit=20000');
        if(rows&&rows.length>0) {
            this.state.orders=rows.map(o=>({id:o.id,timestamp:o.timestamp,items:o.items,subtotal:o.subtotal,totalCost:o.total_cost,discount:o.discount,vat:o.vat,total:o.total,profit:o.profit,staffId:o.staff_id,staffName:o.staff_name,paymentMethod:o.payment_method||'cash'}));
            this._saveBatch(this.state.orders);
        }

        this._lastSyncTime=new Date().toISOString();
        this.render();
        console.log('[Supa] โหลดสำเร็จ');
    }

    startPolling() {
        if(this._pollTimer) clearInterval(this._pollTimer);
        this._lastSyncTime=this._lastSyncTime||new Date().toISOString();
        this._pollTimer=setInterval(async()=>{
            if(!this.state.supabaseUrl||!this.state.supabaseKey||!navigator.onLine) return;
            const since=this._lastSyncTime;
            this._lastSyncTime=new Date().toISOString();

            // New/updated orders since last poll
            const newOrders=await this._supaFetch(`orders?select=*&timestamp=gt.${encodeURIComponent(since)}&order=timestamp.desc`);
            if(newOrders&&newOrders.length>0){
                let changed=false;
                for(const o of newOrders){
                    const mapped={id:o.id,timestamp:o.timestamp,items:o.items,subtotal:o.subtotal,totalCost:o.total_cost,discount:o.discount,vat:o.vat,total:o.total,profit:o.profit,staffId:o.staff_id,staffName:o.staff_name,paymentMethod:o.payment_method||'cash'};
                    const idx=this.state.orders.findIndex(x=>x.id===o.id);
                    if(idx<0){this.state.orders.unshift(mapped);this.updateOrderById(mapped);}
                    else{this.state.orders[idx]=mapped;this.updateOrderById(mapped);}
                    changed=true;
                }
                if(changed) this.render();
            }

            // Config changes (products, users)
            const cfg=await this._supaFetch('pos_config?select=key,value&key=in.(products,users)');
            if(cfg){
                let cfgChanged=false;
                for(const row of cfg){
                    try{
                        if(row.key==='products'){const p=JSON.parse(row.value);if(JSON.stringify(p)!==JSON.stringify(this.products)){this.products=p;cfgChanged=true;}}
                        else if(row.key==='users'){const u=JSON.parse(row.value);if(JSON.stringify(u)!==JSON.stringify(this.auth.users)){this.auth.users=u;}}
                    }catch(e){}
                }
                if(cfgChanged) this.render();
            }
        },30000); // ซิงค์ทุก 30 วินาที
    }

    // ==================== SUPABASE REALTIME ====================
    startRealtimeSync() {
        if(!this.state.supabaseUrl||!this.state.supabaseKey) return;
        // Close existing WebSocket
        if(this._ws){try{this._ws.onclose=null;this._ws.close();}catch(e){}this._ws=null;}
        const wsUrl=this.state.supabaseUrl.replace(/^https/,'wss').replace(/^http/,'ws')+
            `/realtime/v1/websocket?apikey=${encodeURIComponent(this.state.supabaseKey)}&vsn=1.0.0`;
        let ws;
        try{ ws=new WebSocket(wsUrl); }catch(e){ console.warn('[RT] WebSocket ไม่รองรับ'); return; }
        this._ws=ws;
        let hbTimer=null;
        const joinRef='1';
        ws.onopen=()=>{
            console.log('[RT] เชื่อมต่อ Supabase Realtime สำเร็จ ✅');
            ws.send(JSON.stringify({topic:'realtime:pos_sync',event:'phx_join',payload:{config:{broadcast:{self:false},presence:{key:''},postgres_changes:[{event:'*',schema:'public',table:'orders'},{event:'*',schema:'public',table:'pos_config'}]}},ref:joinRef,join_ref:joinRef}));
            // Heartbeat ทุก 20 วินาที
            hbTimer=setInterval(()=>{if(ws.readyState===WebSocket.OPEN)ws.send(JSON.stringify({topic:'phoenix',event:'heartbeat',payload:{},ref:'hb'}));},20000);
        };
        ws.onmessage=(ev)=>{
            let msg;try{msg=JSON.parse(ev.data);}catch(e){return;}
            if(msg.event==='postgres_changes'&&msg.payload?.data){
                const ch=msg.payload.data;
                if(ch.table==='orders'){
                    if(ch.eventType==='INSERT'||ch.eventType==='UPDATE'){
                        const o=ch.new;
                        const mapped={id:o.id,timestamp:o.timestamp,items:o.items,subtotal:o.subtotal,totalCost:o.total_cost,discount:o.discount,vat:o.vat,total:o.total,profit:o.profit,staffId:o.staff_id||'',staffName:o.staff_name||'',paymentMethod:o.payment_method||'cash'};
                        const idx=this.state.orders.findIndex(x=>x.id===o.id);
                        if(idx<0){this.state.orders.unshift(mapped);}else{this.state.orders[idx]=mapped;}
                        this.updateOrderById(mapped);
                        this.render();
                        console.log('[RT] ออเดอร์ใหม่จากเครื่องอื่น:',o.id);
                    } else if(ch.eventType==='DELETE'){
                        const id=ch.old?.id;
                        if(id){this.state.orders=this.state.orders.filter(x=>x.id!==id);this.deleteOrderById(id);this.render();}
                    }
                } else if(ch.table==='pos_config'){
                    // สินค้า/ผู้ใช้เปลี่ยน — โหลดใหม่
                    this.loadFromSupabase();
                }
            }
        };
        ws.onerror=(e)=>{ console.warn('[RT] WebSocket error',e); };
        ws.onclose=(e)=>{
            clearInterval(hbTimer);
            console.log('[RT] ตัดการเชื่อมต่อ — reconnect ใน 5 วินาที');
            // Reconnect เฉพาะเมื่อยังมี credentials
            setTimeout(()=>{ if(this.state.supabaseUrl&&this.state.supabaseKey&&this._ws===ws) this.startRealtimeSync(); },5000);
        };
    }

    // ==================== CART ACTIONS ====================
    addToCart(product) {
        if(product.isDrink){this.state.showSweetness=true;this.state.sweetnessProduct=product;this.render();return;}
        const ex=this.state.cart.find(i=>i.id===product.id&&!i.sweetness&&i.sweetness!==0);
        if(ex)ex.quantity++;else this.state.cart.push({...product,quantity:1});
        this.render();
    }
    addToCartWithSweetness(product,sweetness){
        const dn=`${product.name} (${sweetness}%)`;
        const ex=this.state.cart.find(i=>i.id===product.id&&i.sweetness===sweetness);
        if(ex)ex.quantity++;else this.state.cart.push({...product,name:dn,originalName:product.name,sweetness,quantity:1});
        this.state.showSweetness=false;this.state.sweetnessProduct=null;this.render();
    }
    addShotToCartItem(i){const item=this.state.cart[i];if(!item.extraShots)item.extraShots=0;item.extraShots++;item.price+=10;this.render();}
    updateQuantity(i,c){this.state.cart[i].quantity+=c;if(this.state.cart[i].quantity<=0)this.state.cart.splice(i,1);this.render();}
    removeFromCart(i){this.state.cart.splice(i,1);this.render();}
    clearCart(){this.state.cart=[];this.render();}
    closeReceipt(){this.state.showReceipt=false;this.state.lastOrder=null;this.render();}

    checkout() {
        if(!this.state.cart.length) return;
        const sub=this.state.cart.reduce((s,i)=>s+i.price*i.quantity,0);
        const tc=this.state.cart.reduce((s,i)=>s+i.cost*i.quantity,0);
        const disc=(sub*this.state.discount)/100;
        const vat=(sub-disc)*0.07; const tot=sub-disc+vat; const prof=tot-tc;
        const order={id:Date.now(),timestamp:new Date().toISOString(),items:[...this.state.cart],subtotal:sub,totalCost:tc,discount:disc,vat,total:tot,profit:prof,staffId:this.auth.currentUser?.id,staffName:this.auth.currentUser?.name||'',paymentMethod:this.state.paymentMethod||'cash'};
        this.state.orders.unshift(order);
        this.saveOrders();
        // Supabase sync
        this.syncToSupabase(order);
        // Auto Google Sheets
        if(this.state.autoExportSheets&&this.state.googleSheetUrl) this.sendOrderToSheets(order);
        // Show receipt
        this.state.lastOrder=order;
        this.state.showReceipt=true;
        this.state.cart=[];
        this.render();
    }
    async sendOrderToSheets(order){if(!this.state.googleSheetUrl)return;try{const d=new Date(order.timestamp);const last=order.items.length-1;const rows=order.items.map((item,idx)=>({date:d.toLocaleDateString('th-TH'),time:d.toLocaleTimeString('th-TH'),category:this.getCategoryName(item.category),item:item.name,quantity:item.quantity,price:item.price,cost:item.cost,item_profit:((item.price-item.cost)*item.quantity).toFixed(2),subtotal:idx===last?order.subtotal.toFixed(2):'',discount:idx===last?order.discount.toFixed(2):'',vat:idx===last?order.vat.toFixed(2):'',total:idx===last?order.total.toFixed(2):'',staff:order.staffName||'',payment:order.paymentMethod||'cash'}));await fetch(this.state.googleSheetUrl,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({data:rows,month:`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`})});}catch(e){}}

    getCategoryName(c){return{coffee:'Coffee',tea:'Tea',softdrink:'Soft Drink',bakery:'Bakery',other:'Other',promotion:'Promotion'}[c]||c;}
    getFilteredProducts(){return this.products.filter(p=>p.category===this.state.selectedCategory);}
    getAvailableMonths(){const m=new Set();this.state.orders.forEach(o=>{const d=new Date(o.timestamp);m.add(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);});return Array.from(m).sort().reverse();}
    getMonthName(mk){if(mk==='all')return'ทั้งหมด';const[y,m]=mk.split('-');const n=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];return`${n[parseInt(m)-1]} ${parseInt(y)+543}`;}
    getMonthNameFull(mk){if(mk==='all')return'ทั้งหมด';const[y,m]=mk.split('-');const n=['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];return`${n[parseInt(m)-1]} ${parseInt(y)+543}`;}
    getFilteredOrders(){if(this.state.selectedMonth==='all')return this.state.orders;return this.state.orders.filter(o=>{const d=new Date(o.timestamp);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`===this.state.selectedMonth;});}

    getExportOrders(){const p=this.state.exportPeriod;return this.state.orders.filter(o=>{const d=new Date(o.timestamp);if(p==='day')return d.toISOString().split('T')[0]===this.state.exportDate;if(p==='week'){const{start,end}=this.getWeekRange(this.state.exportWeek);start.setHours(0,0,0,0);end.setHours(23,59,59,999);return d>=start&&d<=end;}if(p==='month')return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`===this.state.exportMonth;if(p==='year')return String(d.getFullYear())===this.state.exportYear;return true;});}
    getExportLabel(){const p=this.state.exportPeriod;if(p==='day'){const d=new Date(this.state.exportDate+'T00:00:00');return`วันที่ ${d.toLocaleDateString('th-TH',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}`;}if(p==='week')return`สัปดาห์ ${this.getWeekLabel(this.state.exportWeek)}`;if(p==='month')return this.getMonthNameFull(this.state.exportMonth);if(p==='year')return`ปี ${parseInt(this.state.exportYear)+543}`;return'';}
    calcExportStats(orders){const revenue=orders.reduce((s,o)=>s+o.total,0),cost=orders.reduce((s,o)=>s+o.totalCost,0),profit=orders.reduce((s,o)=>s+o.profit,0),items=orders.reduce((s,o)=>s+o.items.reduce((ss,i)=>ss+i.quantity,0),0),margin=revenue>0?(profit/revenue*100):0;const productMap={},catMap={};orders.forEach(o=>o.items.forEach(item=>{const k=item.originalName||item.name;if(!productMap[k])productMap[k]={name:k,category:item.category,qty:0,revenue:0,profit:0};productMap[k].qty+=item.quantity;productMap[k].revenue+=item.price*item.quantity;productMap[k].profit+=(item.price-item.cost)*item.quantity;if(!catMap[item.category])catMap[item.category]={qty:0,revenue:0,profit:0};catMap[item.category].qty+=item.quantity;catMap[item.category].revenue+=item.price*item.quantity;catMap[item.category].profit+=(item.price-item.cost)*item.quantity;}));const topProducts=Object.values(productMap).sort((a,b)=>b.qty-a.qty).slice(0,10);return{revenue,cost,profit,items,margin,orderCount:orders.length,topProducts,catMap};}
    exportPeriodCSV(){const orders=this.getExportOrders();if(!orders.length){alert('❌ ไม่มีข้อมูลในช่วงที่เลือก');return;}const label=this.getExportLabel();const headers=['วันที่','เวลา','หมวดหมู่','รายการ','จำนวน','ราคา','ต้นทุน','ยอดรวม','ส่วนลด','VAT','สุทธิ','กำไร','พนักงาน','ช่องทางชำระ'];const rows=orders.flatMap(o=>{const d=new Date(o.timestamp);const pm={cash:'เงินสด',transfer:'โอนเงิน',card:'บัตร'}[o.paymentMethod||'cash']||'เงินสด';return o.items.map(item=>[d.toLocaleDateString('th-TH'),d.toLocaleTimeString('th-TH'),this.getCategoryName(item.category),item.name,item.quantity,item.price,item.cost,o.subtotal.toFixed(2),o.discount.toFixed(2),o.vat.toFixed(2),o.total.toFixed(2),o.profit.toFixed(2),o.staffName||'',pm]);});const csv=[headers.join(','),...rows.map(r=>r.join(','))].join('\n');const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'});const link=document.createElement('a');link.href=URL.createObjectURL(blob);link.download=`POS_${this.state.exportPeriod}_${this.state.exportDate||this.state.exportWeek||this.state.exportMonth||this.state.exportYear}.csv`;link.click();alert(`✅ Export CSV สำเร็จ!\n${label}\n${orders.length} รายการ`);}
    async exportPeriodSheets(){const orders=this.getExportOrders();if(!orders.length){alert('❌ ไม่มีข้อมูลในช่วงที่เลือก');return;}if(!this.state.googleSheetUrl){this.state.showSettings=true;this.render();return;}try{const data=orders.flatMap(o=>{const d=new Date(o.timestamp);const last=o.items.length-1;return o.items.map((item,idx)=>({date:d.toLocaleDateString('th-TH'),time:d.toLocaleTimeString('th-TH'),category:this.getCategoryName(item.category),item:item.name,quantity:item.quantity,price:item.price,cost:item.cost,item_profit:((item.price-item.cost)*item.quantity).toFixed(2),subtotal:idx===last?o.subtotal.toFixed(2):'',discount:idx===last?o.discount.toFixed(2):'',vat:idx===last?o.vat.toFixed(2):'',total:idx===last?o.total.toFixed(2):'',staff:o.staffName||'',payment:o.paymentMethod||'cash'}));});const mk=this.state.exportPeriod==='year'?this.state.exportYear:this.state.exportPeriod==='month'?this.state.exportMonth:this.state.exportPeriod==='week'?this.state.exportWeek:this.state.exportDate;await fetch(this.state.googleSheetUrl,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({data,month:mk})});alert(`✅ ส่งไป Google Drive สำเร็จ!\n📋 Tab: ${mk}`);}catch(e){alert('❌ '+e.message);}}
    getProductAnalytics(){const fo=this.getFilteredOrders();const m={};fo.forEach(o=>o.items.forEach(item=>{const k=item.originalName||item.name;if(!m[k])m[k]={name:k,category:item.category,quantity:0,revenue:0,cost:0,profit:0,basePrice:item.price,baseCost:item.cost,orders:new Set()};m[k].quantity+=item.quantity;m[k].revenue+=item.price*item.quantity;m[k].cost+=item.cost*item.quantity;m[k].profit+=(item.price-item.cost)*item.quantity;m[k].orders.add(o.id);}));return Object.values(m).map(p=>({...p,profitPerUnit:p.quantity>0?p.profit/p.quantity:0,profitMargin:p.revenue>0?(p.profit/p.revenue)*100:0,orderCount:p.orders.size}));}
    classifyProduct(p,mxQ,mxP){const qr=mxQ>0?p.quantity/mxQ:0,pr=mxP>0?p.profitPerUnit/mxP:0;if(qr>=.3&&pr>=.3)return{label:'⭐ Star',cls:'signal-star'};if(qr>=.3)return{label:'🔄 Volume',cls:'signal-keep'};if(pr>=.3)return{label:'💎 Niche',cls:'signal-warn'};return{label:'⚠️ Review',cls:'signal-drop'};}
    getBundleSuggestions(){const a=this.getProductAnalytics();if(!a.length)return[];const mxQ=Math.max(...a.map(x=>x.quantity));const stars=a.filter(p=>p.quantity/mxQ>=.3).sort((a,b)=>b.quantity-a.quantity).slice(0,5);const slow=a.filter(p=>p.quantity/mxQ<.3&&p.profitPerUnit>0).sort((a,b)=>b.profitPerUnit-a.profitPerUnit).slice(0,5);const bundles=[];stars.forEach(s=>slow.forEach(sl=>{if(s.category!==sl.category){const bp=Math.round((s.basePrice+sl.basePrice)*.9);bundles.push({star:s.name,slow:sl.name,originalTotal:s.basePrice+sl.basePrice,bundlePrice:bp,bundleCost:s.baseCost+sl.baseCost,bundleProfit:bp-(s.baseCost+sl.baseCost),discount:s.basePrice+sl.basePrice-bp,profitMargin:bp>0?((bp-(s.baseCost+sl.baseCost))/bp*100):0});}}));return bundles.sort((a,b)=>b.bundleProfit-a.bundleProfit).slice(0,8);}
    getStockInsights(){const fo=this.getFilteredOrders();if(!fo.length)return{daily:[],daysCount:0,peakHours:[]};const dm={},hm={};fo.forEach(o=>{const d=new Date(o.timestamp);const dk=d.toLocaleDateString('th-TH');const h=d.getHours();if(!hm[h])hm[h]=0;hm[h]++;o.items.forEach(item=>{const k=item.originalName||item.name;if(!dm[k])dm[k]={name:k,category:item.category,totalQty:0,days:new Set()};dm[k].totalQty+=item.quantity;dm[k].days.add(dk);});});return{daily:Object.values(dm).map(d=>({...d,daysActive:d.days.size,avgPerDay:d.days.size>0?d.totalQty/d.days.size:0,suggestedStock:d.days.size>0?Math.ceil(d.totalQty/d.days.size*1.3):0})).sort((a,b)=>b.avgPerDay-a.avgPerDay),daysCount:new Set(fo.map(o=>new Date(o.timestamp).toLocaleDateString('th-TH'))).size,peakHours:Object.entries(hm).map(([h,c])=>({hour:parseInt(h),count:c})).sort((a,b)=>b.count-a.count)};}
    calculateStats(){const fo=this.getFilteredOrders();const ts=fo.reduce((s,o)=>s+o.total,0),tc=fo.reduce((s,o)=>s+o.totalCost,0),tp=fo.reduce((s,o)=>s+o.profit,0),pm=ts>0?(tp/ts)*100:0;const cs={};this.categories.forEach(c=>{cs[c.id]={name:c.name,quantity:0,revenue:0,cost:0,profit:0,icon:c.icon};});fo.forEach(o=>o.items.forEach(i=>{if(cs[i.category]){cs[i.category].quantity+=i.quantity;cs[i.category].revenue+=i.price*i.quantity;cs[i.category].cost+=i.cost*i.quantity;cs[i.category].profit+=(i.price-i.cost)*i.quantity;}}));return{totalSales:ts,totalCost:tc,totalProfit:tp,profitMargin:pm,totalOrders:fo.length,topProducts:this.getProductAnalytics().sort((a,b)=>b.quantity-a.quantity),categorySales:cs};}
    getMonthlyTrend(){const mm={};this.state.orders.forEach(o=>{const d=new Date(o.timestamp);const mk=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;if(!mm[mk])mm[mk]={revenue:0,cost:0,profit:0,orders:0,items:0};mm[mk].revenue+=o.total;mm[mk].cost+=o.totalCost;mm[mk].profit+=o.profit;mm[mk].orders++;mm[mk].items+=o.items.reduce((s,i)=>s+i.quantity,0);});return Object.entries(mm).sort((a,b)=>a[0].localeCompare(b[0])).map(([k,v])=>({month:k,monthName:this.getMonthNameFull(k),...v}));}

    // ==================== RENDER MAIN ====================
    render() {
        const app=document.getElementById('app');
        // Show login if not authenticated
        if(!this.auth.isLoggedIn()){app.innerHTML=this.renderLoginScreen();this.bindLoginEvents();return;}

        const sub=this.state.cart.reduce((s,i)=>s+i.price*i.quantity,0);
        const tc=this.state.cart.reduce((s,i)=>s+i.cost*i.quantity,0);
        const disc=(sub*this.state.discount)/100;
        const vat=(sub-disc)*.07; const tot=sub-disc+vat;

        let content='';
        if(this.state.currentView==='pos') content=`<div class="flex h-screen">${this.renderSidebar()}<div class="flex-1 flex overflow-hidden">${this.renderProducts()}${this.renderCart(sub,tc,disc,vat,tot)}</div></div>`;
        else content=`<div class="flex h-screen">${this.renderSidebar()}${this.renderReports()}</div>`;

        if(this.state.showSweetness) content+=this.renderSweetnessModal();
        if(this.state.showSettings) content+=this.renderSettingsModal();
        if(this.state.showDemoGenerator) content+=this.renderDemoModal();
        if(this.state.showReceipt&&this.state.lastOrder) content+=this.renderReceiptModal(this.state.lastOrder);
        if(this.state.showUserMgmt) content+=this.renderUserMgmtModal();
        if(this.state.showImageMgmt&&this.state.imageProduct) content+=this.renderImageMgmtModal();
        if(this.state.showProductMgmt) content+=this.renderProductMgmtModal();
        if(this.state.showTodayHistory) content+=this.renderTodayHistoryModal();
        if(this.state.showEditOrder&&this.state.editOrderId) content+=this.renderEditOrderModal();

        app.innerHTML=content;
        this.bindEvents();
        requestAnimationFrame(()=>this.initDashboardCharts());
    }

    renderCart(sub,tc,disc,vat,tot) {

                    +'<button data-remove="'+i+'" class="remove-item text-red-400 hover:text-red-600 text-sm">&#x2715;</button></div>'
                    +'<div class="flex items-center justify-between">'
                    +'<div class="flex items-center gap-1">'

        const discRow = `<div class="flex items-center gap-2 mb-2 p-2.5 bg-red-50 rounded-xl border border-red-100">

                <button id="disc-inc" class="w-6 h-6 bg-white border border-gray-200 rounded-lg text-xs font-bold hover:bg-gray-100">+</button>
                <span class="text-xs text-gray-500">%</span>
            </div>
        </div>`;
        const payRow = '';
        let bottomHtml = '';

            bottomHtml = '<div class="p-4 border-t border-gray-100">'
                + discRow
                +'<div class="space-y-1.5 text-sm mb-3">'
                +'<div class="flex justify-between text-gray-600"><span>ยอดรวม</span><span>&#x0e3f;'+sub.toFixed(2)+'</span></div>'
                +(disc>0?'<div class="flex justify-between text-red-500"><span>ส่วนลด ('+this.state.discount+'%)</span><span>-&#x0e3f;'+disc.toFixed(2)+'</span></div>':'')

                +'<div class="flex justify-between text-lg font-bold pt-2 border-t border-gray-100 mt-2"><span>รวมสุทธิ</span><span style="color:#107c10">&#x0e3f;'+tot.toFixed(2)+'</span></div>'
                +'</div>'
                + payRow
                +'<button class="checkout-btn w-full py-3.5 text-white rounded-xl font-bold text-lg shadow-md transition" style="background:#00BFA5">ชำระเงิน &#x0e3f;'+tot.toFixed(2)+' <span style="font-size:11px;opacity:.7;margin-left:4px">[Enter]</span></button>'
                +'</div>';
        } else {
            bottomHtml = '<div class="p-4 border-t border-gray-100"><button class="checkout-btn w-full py-3.5 rounded-xl font-bold text-lg bg-gray-100 text-gray-400 cursor-not-allowed">ชำระเงิน</button></div>';
        }
        return '<div class="flex flex-col border-l border-gray-100 bg-white" style="width:360px;flex-shrink:0">'
            +'<div class="p-4 border-b border-gray-100"><div class="flex items-center justify-between">'

            +'<div class="flex items-center gap-2">'

    renderExportTab(){const p=this.state.exportPeriod;const orders=this.getExportOrders();const stats=this.calcExportStats(orders);const label=this.getExportLabel();const availYears=[...new Set(this.state.orders.map(o=>String(new Date(o.timestamp).getFullYear())))].sort().reverse();return`<div class="p-5"><div class="bg-teal-50 border border-teal-200 rounded-xl p-5 mb-6"><h3 class="font-bold text-sm mb-3">📅 เลือกช่วงเวลา</h3><div class="flex gap-2 mb-4">${[{id:'day',label:'📆 รายวัน'},{id:'week',label:'📅 สัปดาห์'},{id:'month',label:'🗓️ รายเดือน'},{id:'year',label:'📊 รายปี'}].map(t=>`<button data-export-period="${t.id}" class="period-btn ${p===t.id?'active':''}">${t.label}</button>`).join('')}</div><div class="flex items-center gap-4 flex-wrap">${p==='day'?`<div class="flex items-center gap-2"><label class="text-sm font-medium">วันที่:</label><input type="date" id="export-date" value="${this.state.exportDate}" class="date-input"/></div><div class="flex gap-1"><button class="date-nav-btn px-3 py-1 bg-white border rounded text-sm" data-date-nav="prev">◀</button><button class="date-nav-btn px-3 py-1 bg-teal-500 text-white rounded text-sm" data-date-nav="today">วันนี้</button><button class="date-nav-btn px-3 py-1 bg-white border rounded text-sm" data-date-nav="next">▶</button></div>`:''} ${p==='week'?`<input type="week" id="export-week" value="${this.state.exportWeek}" class="date-input"/>`:''} ${p==='month'?`<input type="month" id="export-month" value="${this.state.exportMonth}" class="date-input"/>`:''} ${p==='year'?`<select id="export-year" class="date-input">${availYears.map(y=>`<option value="${y}" ${this.state.exportYear===y?'selected':''}>${parseInt(y)+543}</option>`).join('')}</select>`:''}<div class="ml-auto text-sm font-medium text-teal-700">📋 ${label}</div></div></div><div class="grid grid-cols-5 gap-3 mb-6"><div class="bg-white p-4 rounded-xl border text-center"><div class="text-xs text-emerald-800">💰 ยอดขาย</div><div class="text-xl font-bold text-emerald-800">฿${stats.revenue.toFixed(0)}</div></div><div class="bg-white p-4 rounded-xl border text-center"><div class="text-xs text-navy-500">📈 กำไร</div><div class="text-xl font-bold text-navy-500">฿${stats.profit.toFixed(0)}</div></div><div class="bg-white p-4 rounded-xl border text-center"><div class="text-xs text-gray-700">🧾 ออเดอร์</div><div class="text-xl font-bold text-gray-700">${stats.orderCount}</div></div><div class="bg-white p-4 rounded-xl border text-center"><div class="text-xs text-teal-700">📦 ชิ้น</div><div class="text-xl font-bold text-teal-700">${stats.items}</div></div><div class="bg-white p-4 rounded-xl border text-center"><div class="text-xs text-teal-700">% กำไร</div><div class="text-xl font-bold text-teal-700">${stats.margin.toFixed(1)}%</div></div></div><div class="bg-gray-50 rounded-xl p-5 border-2 border-dashed border-gray-300"><h3 class="font-bold text-sm mb-3">📤 ดึงข้อมูลออก</h3><div class="flex gap-3 flex-wrap"><button class="export-period-csv export-action-btn bg-green-500 text-white hover:bg-emerald-800">📥 ดาวน์โหลด CSV</button><button class="export-period-sheets export-action-btn bg-blue-500 text-white hover:bg-navy-600">📊 ส่งไป Google Drive</button></div><div class="text-xs text-gray-500 mt-3">💡 ข้อมูลที่จะ Export: <strong>${label}</strong> (${orders.length} ออเดอร์)</div></div></div>`;}

    renderProfitTab(){const a=this.getProductAnalytics();if(!a.length)return'<div class="p-8 text-center text-gray-400">ยังไม่มีข้อมูล</div>';const mxQ=Math.max(...a.map(p=>p.quantity)),mxP=Math.max(...a.map(p=>p.profitPerUnit));const cl=a.map(p=>({...p,signal:this.classifyProduct(p,mxQ,mxP)}));const stars=cl.filter(p=>p.signal.label.includes('Star')),reviews=cl.filter(p=>p.signal.label.includes('Review'));return`<div class="p-5"><div class="bg-yellow-50 border border-yellow-200 rounded-xl p-4 mb-5"><h3 class="font-bold text-sm mb-2">💡 BCG Matrix</h3><div class="grid grid-cols-4 gap-3 text-xs"><div class="flex items-center gap-2"><span class="px-2 py-1 rounded signal-star text-xs">⭐ Star</span> ขายดี+กำไรสูง</div><div class="flex items-center gap-2"><span class="px-2 py-1 rounded signal-keep text-xs">🔄 Volume</span> ขายดีกำไรน้อย</div><div class="flex items-center gap-2"><span class="px-2 py-1 rounded signal-warn text-xs">💎 Niche</span> กำไรสูงขายน้อย</div><div class="flex items-center gap-2"><span class="px-2 py-1 rounded signal-drop text-xs">⚠️ Review</span> พิจารณาเลิก</div></div></div><div class="overflow-x-auto"><table class="w-full text-xs"><thead class="bg-gray-50"><tr><th class="px-3 py-2 text-left">สัญญาณ</th><th class="px-3 py-2 text-left">สินค้า</th><th class="px-3 py-2 text-left">หมวด</th><th class="px-3 py-2 text-right">จำนวน</th><th class="px-3 py-2 text-right">รายได้</th><th class="px-3 py-2 text-right">กำไร/ชิ้น</th><th class="px-3 py-2 text-right">%กำไร</th><th class="px-3 py-2 text-right">กำไรรวม</th></tr></thead><tbody>${cl.sort((a,b)=>{const o={'⭐ Star':0,'🔄 Volume':1,'💎 Niche':2,'⚠️ Review':3};return(o[a.signal.label]||9)-(o[b.signal.label]||9)||b.profit-a.profit;}).map(p=>`<tr class="border-t hover:bg-gray-50"><td class="px-3 py-2"><span class="px-2 py-0.5 rounded text-xs ${p.signal.cls}">${p.signal.label}</span></td><td class="px-3 py-2 font-medium">${p.name}</td><td class="px-3 py-2 text-gray-500">${this.getCategoryName(p.category)}</td><td class="px-3 py-2 text-right">${p.quantity}</td><td class="px-3 py-2 text-right">฿${p.revenue.toFixed(0)}</td><td class="px-3 py-2 text-right font-bold ${p.profitPerUnit>=30?'text-emerald-700':p.profitPerUnit>=20?'text-blue-600':'text-red-500'}">฿${p.profitPerUnit.toFixed(0)}</td><td class="px-3 py-2 text-right">${p.profitMargin.toFixed(1)}%</td><td class="px-3 py-2 text-right font-bold text-emerald-700">฿${p.profit.toFixed(0)}</td></tr>`).join('')}</tbody></table></div><div class="grid grid-cols-2 gap-6 mt-6"><div class="bg-green-50 border border-green-200 rounded-xl p-4"><h4 class="font-bold text-sm text-green-800 mb-2">✅ ควรโฟกัส (${stars.length})</h4><div class="text-xs text-emerald-800 space-y-1">${stars.slice(0,5).map(p=>`<div>• <strong>${p.name}</strong> — กำไร/ชิ้น ฿${p.profitPerUnit.toFixed(0)}, ขาย ${p.quantity}</div>`).join('')}${!stars.length?'<div class="text-gray-400">ยังไม่มีข้อมูล</div>':''}</div></div><div class="bg-red-50 border border-red-200 rounded-xl p-4"><h4 class="font-bold text-sm text-red-800 mb-2">⚠️ พิจารณาเลิก (${reviews.length})</h4><div class="text-xs text-red-700 space-y-1">${reviews.slice(0,5).map(p=>`<div>• <strong>${p.name}</strong> — กำไร/ชิ้น ฿${p.profitPerUnit.toFixed(0)}, ขายแค่ ${p.quantity}</div>`).join('')}${!reviews.length?'<div class="text-gray-400">ยังไม่มีข้อมูล</div>':''}</div></div></div></div>`;}

    renderBundleTab(){const b=this.getBundleSuggestions();const a=this.getProductAnalytics();if(!a.length)return'<div class="p-8 text-center text-gray-400">ยังไม่มีข้อมูล</div>';return`<div class="p-5"><div class="bg-purple-50 border border-purple-200 rounded-xl p-4 mb-5"><h3 class="font-bold text-sm mb-1">🎯 จับคู่สินค้าขายดี + ขายช้า (ลด 10%)</h3></div>${!b.length?'<div class="text-center py-8 text-gray-400">ยังไม่มีข้อมูลเพียงพอ</div>':`<div class="grid grid-cols-2 gap-4">${b.map((x,i)=>`<div class="border-2 border-dashed border-teal-300 rounded-xl p-4 bg-teal-50"><div class="flex items-center gap-2 mb-3"><div class="w-7 h-7 bg-teal-500 text-white rounded-full flex items-center justify-center text-xs font-bold">${i+1}</div><div class="font-bold text-sm">ชุดที่ ${i+1}</div><span class="ml-auto text-xs px-2 py-1 bg-green-100 text-emerald-800 rounded-full">กำไร ฿${x.bundleProfit.toFixed(0)}</span></div><div class="flex items-center gap-2 mb-2"><div class="flex-1 bg-white rounded-lg p-2 text-center"><div class="text-xs text-gray-500">⭐ ตัวดึง</div><div class="text-xs font-bold">${x.star}</div></div><div class="text-xl">+</div><div class="flex-1 bg-white rounded-lg p-2 text-center"><div class="text-xs text-gray-500">📦 ตัวเสริม</div><div class="text-xs font-bold">${x.slow}</div></div></div><div class="flex items-center justify-between text-xs"><div>ปกติ <span class="line-through text-gray-400">฿${x.originalTotal}</span></div><div class="font-bold text-lg text-teal-600">฿${x.bundlePrice}</div><div class="text-emerald-700">Margin ${x.profitMargin.toFixed(0)}%</div></div></div>`).join('')}</div>`}</div>`;}

    renderStockTab(){const st=this.getStockInsights();if(!st.daily.length)return'<div class="p-8 text-center text-gray-400">ยังไม่มีข้อมูล</div>';return`<div class="p-5"><div class="bg-blue-50 border border-blue-200 rounded-xl p-4 mb-5"><h3 class="font-bold text-sm mb-1">📦 สต็อกแนะนำ = เฉลี่ย/วัน + Buffer 30%</h3><p class="text-xs text-navy-500">📅 ข้อมูลจาก ${st.daysCount} วัน</p></div>${st.peakHours.length?`<div class="mb-6"><h3 class="font-bold text-sm mb-3">⏰ Peak Hours</h3><div class="flex gap-1 flex-wrap">${Array.from({length:24},(_,h)=>{const f=st.peakHours.find(p=>p.hour===h);const c=f?f.count:0;const mx=st.peakHours[0]?.count||1;const int=c/mx;const bg=int>.7?'bg-red-500 text-white':int>.4?'bg-gold-400 text-white':int>.1?'bg-yellow-200':'bg-gray-100 text-gray-400';return`<div class="w-10 h-10 rounded-lg flex flex-col items-center justify-center text-xs ${bg}"><div class="font-bold">${String(h).padStart(2,'0')}</div><div style="font-size:9px">${c||''}</div></div>`;}).join('')}</div></div>`:''}<div class="overflow-x-auto"><table class="w-full text-xs"><thead class="bg-gray-50"><tr><th class="px-3 py-2 text-left">สินค้า</th><th class="px-3 py-2 text-left">หมวด</th><th class="px-3 py-2 text-right">ขายรวม</th><th class="px-3 py-2 text-right">เฉลี่ย/วัน</th><th class="px-3 py-2 text-right">🎯 สต็อก/วัน</th><th class="px-3 py-2 text-center">ระดับ</th></tr></thead><tbody>${st.daily.slice(0,30).map(d=>{const lv=d.avgPerDay>=5?'🔴 สูง':d.avgPerDay>=2?'🟡 กลาง':'🟢 ต่ำ';return`<tr class="border-t hover:bg-gray-50"><td class="px-3 py-2 font-medium">${d.name}</td><td class="px-3 py-2 text-gray-500">${this.getCategoryName(d.category)}</td><td class="px-3 py-2 text-right">${d.totalQty}</td><td class="px-3 py-2 text-right">${d.avgPerDay.toFixed(1)}</td><td class="px-3 py-2 text-right font-bold text-blue-600">${d.suggestedStock}</td><td class="px-3 py-2 text-center">${lv}</td></tr>`;}).join('')}</tbody></table></div></div>`;}

    // ==================== DASHBOARD (kept from original, simplified) ====================
    renderDashboardTab() {
        const allOrders=this.getFilteredOrders();
        if(!allOrders.length) return '<div class="p-8 text-center text-gray-400"><div class="text-4xl mb-2">📊</div>ยังไม่มีข้อมูล สร้างข้อมูลจำลองเพื่อทดสอบได้</div>';
        const dp=this.state.dashPeriod;
        const {orders,prevOrders,periodLabel,prevLabel}=this.getDashFilteredOrders(allOrders);
        const agg=this.aggregateDashboardData(orders);
        const prevAgg=prevOrders.length?this.aggregateDashboardData(prevOrders):null;
        const st=this.state.dashSubTab;
        const availMonths=this.getAvailableMonths();
        const availYears=[...new Set(allOrders.map(o=>String(new Date(o.timestamp).getFullYear())))].sort().reverse();
        const availWeeks=this.getAvailableWeeks(allOrders);
        return`<div><div style="background:#F0FDFA;border-bottom:1px solid #B2DFDB;padding:10px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap"><span style="font-size:11px;color:#888;font-weight:600">🔽 ช่วงเวลา:</span><div style="display:flex;gap:4px">${[{id:'all',l:'ทั้งหมด'},{id:'day',l:'📆 รายวัน'},{id:'week',l:'📅 สัปดาห์'},{id:'month',l:'🗓 เดือน'},{id:'year',l:'📊 ปี'}].map(t=>`<button data-dash-period="${t.id}" class="fbtn-dash ${dp===t.id?'active':''}">${t.l}</button>`).join('')}</div>${dp!=='all'?`<label style="display:flex;align-items:center;gap:5px;font-size:11px;color:#666;cursor:pointer"><input type="checkbox" id="dash-compare" ${this.state.dashCompare?'checked':''} style="accent-color:#00BFA5"/>🔄 เทียบกัน</label>`:''}</div>
        ${dp!=='all'?`<div style="background:white;border-bottom:1px solid #B2DFDB;padding:8px 20px;display:flex;flex-direction:column;gap:6px">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><div style="flex:1;display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:8px;background:#e8f4fd;border:1px solid #b3d9f5">${dp==='day'?`<input type="date" id="dash-date" value="${this.state.dashDate}" class="date-input" style="font-size:12px"><div style="display:flex;gap:2px"><button class="dash-nav" data-dash-nav="prev-day" style="padding:2px 8px;border:1px solid #ddd;border-radius:4px;font-size:10px;cursor:pointer;background:white">◀</button><button class="dash-nav" data-dash-nav="today" style="padding:2px 8px;border-radius:4px;font-size:10px;cursor:pointer;background:#0078d4;color:white;border:none">วันนี้</button><button class="dash-nav" data-dash-nav="next-day" style="padding:2px 8px;border:1px solid #ddd;border-radius:4px;font-size:10px;cursor:pointer;background:white">▶</button></div>`:''}${dp==='week'?`<select id="dash-week" class="date-input" style="font-size:12px">${availWeeks.map(w=>`<option value="${w.key}" ${w.key===this.state.dashWeekOffset+''?'selected':''}>${w.label}</option>`).join('')}</select>`:''} ${dp==='month'?`<select id="dash-month" class="date-input" style="font-size:12px">${availMonths.map(m=>`<option value="${m}" ${m===this.state.dashMonthKey?'selected':''}>${this.getMonthNameFull(m)}</option>`).join('')}</select>`:''} ${dp==='year'?`<select id="dash-year" class="date-input" style="font-size:12px">${availYears.map(y=>`<option value="${y}" ${y===this.state.dashYear?'selected':''}>${parseInt(y)+543}</option>`).join('')}</select>`:''}</div></div>
            ${this.state.dashCompare?`<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><div style="flex:1;display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:8px;background:#fdf0e0;border:1px solid #f0c070">${dp==='day'?`<input type="date" id="dash-date2" value="${this.state.dashDate2||''}" class="date-input" style="font-size:12px">`:''}${dp==='week'?`<select id="dash-week2" class="date-input" style="font-size:12px">${availWeeks.map(w=>`<option value="${w.key}" ${w.key===(this.state.dashWeekOffset2!=null?this.state.dashWeekOffset2+'':'1')?'selected':''}>${w.label}</option>`).join('')}</select>`:''} ${dp==='month'?`<select id="dash-month2" class="date-input" style="font-size:12px">${availMonths.map(m=>`<option value="${m}" ${m===(this.state.dashMonthKey2||availMonths[1]||availMonths[0]||'')?'selected':''}>${this.getMonthNameFull(m)}</option>`).join('')}</select>`:''} ${dp==='year'?`<select id="dash-year2" class="date-input" style="font-size:12px">${availYears.map(y=>`<option value="${y}" ${y===(this.state.dashYear2||availYears[1]||availYears[0])?'selected':''}>${parseInt(y)+543}</option>`).join('')}</select>`:''}</div></div>`:''}
        </div>`:''}

        <div class="flex gap-1 px-4 pt-3" style="border-bottom:1px solid #B2DFDB">${[{id:'overview',l:'📊 ภาพรวม'},{id:'products',l:'🏆 สินค้า'},{id:'time',l:'⏰ ช่วงเวลา'},{id:'detail',l:'📋 รายละเอียด'}].map(t=>`<button data-dash-sub="${t.id}" class="pbi-stab ${st===t.id?'active':''}">${t.l}</button>`).join('')}</div>

    getAvailableWeeks(orders){const weeks=[];if(!orders.length)return weeks;const dates=orders.map(o=>new Date(o.timestamp)).sort((a,b)=>b-a);const now=new Date();now.setHours(0,0,0,0);const day=now.getDay();const diff=now.getDate()-day+(day===0?-6:1);const thisMonday=new Date(now);thisMonday.setDate(diff);const earliest=new Date(Math.min(...dates));earliest.setHours(0,0,0,0);let d=new Date(thisMonday);let offset=0;while(d>=earliest&&offset<52){const end=new Date(d);end.setDate(d.getDate()+6);const dd=d.getDate(),mm=d.getMonth()+1,dd2=end.getDate(),mm2=end.getMonth()+1;const mTh=['','ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];weeks.push({key:String(offset),label:`${dd} ${mTh[mm]} - ${dd2} ${mTh[mm2]} ${end.getFullYear()+543}`,start:new Date(d),end:new Date(end)});d.setDate(d.getDate()-7);offset++;}return weeks;}

    getDashFilteredOrders(allOrders){const dp=this.state.dashPeriod;const mTh=['','ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];const fmtDate=(dk)=>{const[y,m,d]=dk.split('-');return`${parseInt(d)} ${mTh[parseInt(m)]} ${parseInt(y)+543}`;};if(dp==='all')return{orders:allOrders,prevOrders:[],periodLabel:'ทั้งหมด',prevLabel:''};if(dp==='day'){const dk=this.state.dashDate;const orders=allOrders.filter(o=>o.timestamp.startsWith(dk));const dk2=this.state.dashDate2;const prevOrders=this.state.dashCompare?allOrders.filter(o=>o.timestamp.startsWith(dk2)):[];return{orders,prevOrders,periodLabel:fmtDate(dk),prevLabel:fmtDate(dk2)};}if(dp==='week'){const weeks=this.getAvailableWeeks(allOrders);const fW=(offset)=>{const w=weeks.find(w=>w.key===String(offset));if(!w)return{orders:[],label:'—'};const s=new Date(w.start);s.setHours(0,0,0,0);const e=new Date(w.end);e.setHours(23,59,59,999);return{orders:allOrders.filter(o=>{const t=new Date(o.timestamp);return t>=s&&t<=e;}),label:w.label};};const a=fW(parseInt(this.state.dashWeekOffset)||0);const b=this.state.dashCompare?fW(parseInt(this.state.dashWeekOffset2)||1):{orders:[],label:''};return{orders:a.orders,prevOrders:b.orders,periodLabel:a.label,prevLabel:b.label};}if(dp==='month'){const availMonths=this.getAvailableMonths();const mk=this.state.dashMonthKey||availMonths[0]||'';const orders=allOrders.filter(o=>{const d=new Date(o.timestamp);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`===mk;});const mk2=this.state.dashMonthKey2||availMonths[1]||availMonths[0]||'';const prevOrders=this.state.dashCompare?allOrders.filter(o=>{const d=new Date(o.timestamp);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`===mk2;}):[];return{orders,prevOrders,periodLabel:this.getMonthNameFull(mk),prevLabel:this.getMonthNameFull(mk2)};}if(dp==='year'){const yk=this.state.dashYear;const orders=allOrders.filter(o=>o.timestamp.startsWith(yk));const yk2=this.state.dashYear2;const prevOrders=this.state.dashCompare?allOrders.filter(o=>o.timestamp.startsWith(yk2)):[];return{orders,prevOrders,periodLabel:`ปี พ.ศ. ${parseInt(yk)+543}`,prevLabel:`ปี พ.ศ. ${parseInt(yk2)+543}`};}return{orders:allOrders,prevOrders:[],periodLabel:'',prevLabel:''};}

    aggregateDashboardData(orders){const daily={},hourly={},prodMap={},catMap={};orders.forEach(o=>{const d=new Date(o.timestamp);const dk=d.toISOString().split('T')[0];const h=d.getHours();if(!daily[dk])daily[dk]={date:dk,rev:0,cost:0,profit:0,orders:0,items:0};daily[dk].rev+=o.total;daily[dk].cost+=o.totalCost;daily[dk].profit+=o.profit;daily[dk].orders++;daily[dk].items+=o.items.reduce((s,i)=>s+i.quantity,0);if(!hourly[h])hourly[h]={hour:h,rev:0,orders:0};hourly[h].rev+=o.total;hourly[h].orders++;o.items.forEach(item=>{const k=item.originalName||item.name;if(!prodMap[k])prodMap[k]={name:k,catKey:item.category,cat:this.getCategoryName(item.category),qty:0,rev:0,cost:0,profit:0};prodMap[k].qty+=item.quantity;prodMap[k].rev+=item.price*item.quantity;prodMap[k].cost+=item.cost*item.quantity;prodMap[k].profit+=(item.price-item.cost)*item.quantity;const ck=item.category;if(!catMap[ck])catMap[ck]={name:this.getCategoryName(ck),catKey:ck,rev:0,qty:0,profit:0,color:({coffee:'#0078d4',tea:'#107c10',softdrink:'#d83b01',bakery:'#8764b8',promotion:'#f2a500',other:'#8a8886'})[ck]||'#ccc'};catMap[ck].rev+=item.price*item.quantity;catMap[ck].qty+=item.quantity;catMap[ck].profit+=(item.price-item.cost)*item.quantity;});});const dailyArr=Object.values(daily).sort((a,b)=>a.date.localeCompare(b.date));return{daily:dailyArr,hourly:Object.values(hourly).sort((a,b)=>a.hour-b.hour),prodMap,catMap,totalOrders:orders.length,totalRev:orders.reduce((s,o)=>s+o.total,0),totalProfit:orders.reduce((s,o)=>s+o.profit,0),totalItems:orders.reduce((s,o)=>s+o.items.reduce((ss,i)=>ss+i.quantity,0),0),totalCost:orders.reduce((s,o)=>s+o.totalCost,0)};}

        <div class="pbi-card"><div class="pbi-card-header"><div class="pbi-card-title">📊 ยอดขายรายวัน</div><div class="pbi-actions" style="display:flex;align-items:center;gap:5px;flex-wrap:wrap"><button id="daily-bar-prev" style="padding:2px 8px;border:1px solid #B2DFDB;border-radius:4px;font-size:11px;cursor:pointer;background:white">◀</button><input type="date" id="daily-bar-date" value="${this.state.dailyBarDate}" style="padding:2px 6px;border:1px solid #B2DFDB;border-radius:6px;font-size:11px;background:white;cursor:pointer"><button id="daily-bar-next" style="padding:2px 8px;border:1px solid #B2DFDB;border-radius:4px;font-size:11px;cursor:pointer;background:white">▶</button><button id="daily-bar-today" style="padding:2px 8px;border-radius:4px;font-size:11px;cursor:pointer;background:#00BFA5;color:white;border:none">วันนี้</button></div></div><div id="daily-bar-summary" style="display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap"></div><canvas id="pbiBarChart" height="90"></canvas></div>`;

    }
    renderPBIProducts(agg){const tc=this.state.dashTopCat;const allProds=Object.values(agg.prodMap);const filtered=tc==='all'?allProds:allProds.filter(p=>p.catKey===tc);const top=filtered.sort((a,b)=>b.qty-a.qty).slice(0,10);const maxQty=top.length?Math.max(...top.map(p=>p.qty)):1;return`<div style="display:flex;gap:5px;margin-bottom:14px;flex-wrap:wrap;align-items:center"><span style="font-size:11px;color:#888;font-weight:600">📦 หมวดหมู่:</span><button data-dtop-cat="all" class="fbtn-dash ${tc==='all'?'active':''}">ทั้งหมด</button>${this.categories.map(c=>`<button data-dtop-cat="${c.id}" class="fbtn-dash ${tc===c.id?'active':''}">${c.icon} ${c.name}</button>`).join('')}</div>${!top.length?'<div class="text-center py-8 text-gray-400">ไม่มีข้อมูล</div>':`<div class="space-y-2">${top.map((p,i)=>`<div class="bar-container"><div class="bar-label">${['🥇','🥈','🥉'][i]||`${i+1}.`} ${p.name}</div><div class="bar-track"><div class="bar-fill" style="width:${(p.qty/maxQty*100).toFixed(1)}%"><span class="bar-value">${p.qty} ชิ้น | ฿${Math.round(p.rev).toLocaleString()}</span></div></div></div>`).join('')}</div>`}`;}

    renderPBITime(agg){const {hourly}=agg;if(!hourly.length)return'<div class="text-center py-8 text-gray-400">ไม่มีข้อมูล</div>';const maxH=Math.max(...hourly.map(h=>h.orders));return`<div class="mb-6"><h4 class="font-bold text-sm mb-3">⏰ Peak Hours (ออเดอร์/ชั่วโมง)</h4><div class="flex gap-1 flex-wrap">${Array.from({length:24},(_,h)=>{const f=hourly.find(x=>x.hour===h);const c=f?f.orders:0;const int=c/maxH;const bg=int>.7?'bg-red-500 text-white':int>.4?'bg-gold-400 text-white':int>.1?'bg-yellow-200':'bg-gray-100 text-gray-400';return`<div class="w-10 h-10 rounded-lg flex flex-col items-center justify-center text-xs ${bg}"><div class="font-bold">${String(h).padStart(2,'0')}</div><div style="font-size:9px">${c||''}</div></div>`;}).join('')}</div></div><canvas id="pbiTimeChart" height="100"></canvas>`;}

    renderPBIDetail(agg){const {daily}=agg;if(!daily.length)return'<div class="text-center py-8 text-gray-400">ไม่มีข้อมูล</div>';return`<div class="overflow-x-auto"><table class="w-full text-xs"><thead class="bg-gray-50"><tr><th class="px-3 py-2 text-left">วันที่</th><th class="px-3 py-2 text-right">ออเดอร์</th><th class="px-3 py-2 text-right">ชิ้น</th><th class="px-3 py-2 text-right">ยอดขาย</th><th class="px-3 py-2 text-right">ต้นทุน</th><th class="px-3 py-2 text-right">กำไร</th><th class="px-3 py-2 text-right">%กำไร</th></tr></thead><tbody>${daily.map(d=>`<tr class="border-t hover:bg-gray-50"><td class="px-3 py-2">${new Date(d.date+'T12:00:00').toLocaleDateString('th-TH',{weekday:'short',day:'numeric',month:'short'})}</td><td class="px-3 py-2 text-right">${d.orders}</td><td class="px-3 py-2 text-right">${d.items}</td><td class="px-3 py-2 text-right font-bold">฿${Math.round(d.rev).toLocaleString()}</td><td class="px-3 py-2 text-right text-red-500">฿${Math.round(d.cost).toLocaleString()}</td><td class="px-3 py-2 text-right font-bold text-emerald-700">฿${Math.round(d.profit).toLocaleString()}</td><td class="px-3 py-2 text-right ${d.rev>0&&d.profit/d.rev>.3?'text-emerald-700':'text-gray-600'}">${d.rev>0?(d.profit/d.rev*100).toFixed(1):0}%</td></tr>`).join('')}</tbody></table></div>`;}

    initDashboardCharts(){
        if(this.state.currentView!=='reports'||this.state.reportTab!=='dashboard')return;
        if(!document.getElementById('pbiLineChart'))return;
        const allOrders=this.getFilteredOrders();if(!allOrders.length)return;
        const {orders,prevOrders,periodLabel,prevLabel}=this.getDashFilteredOrders(allOrders);
        const agg=this.aggregateDashboardData(orders);
        const prevAgg=prevOrders&&prevOrders.length?this.aggregateDashboardData(prevOrders):null;
        const hasCompare=!!(prevAgg&&(prevAgg.totalRev||prevAgg.totalOrders));
        // Store labels for renderPBIOverview to use
        this._compareLabels={a:periodLabel,b:prevLabel};
        if(this._pbiCharts){Object.values(this._pbiCharts).forEach(c=>{try{c.destroy();}catch(e){}});} this._pbiCharts={};
        const mode=this._pbiLineMode||'rev';
        const lineEl=document.getElementById('pbiLineChart');
        if(lineEl){
            const ctx=lineEl.getContext('2d');
            if(hasCompare&&prevAgg&&prevAgg.daily.length){
                // Compare mode: bar chart ค่าเฉลี่ยต่อวันของสัปดาห์ (จ-อา)
                const dayNames=['อา','จ','อ','พ','พฤ','ศ','ส'];
                const getAvgByDow=(dailyArr)=>{
                    const acc=Array.from({length:7},()=>({sum:0,cnt:0}));
                    dailyArr.forEach(d=>{const dow=new Date(d.date+'T12:00:00').getDay();const v=mode==='profit'?d.profit:mode==='orders'?d.orders:d.rev;acc[dow].sum+=v;acc[dow].cnt++;});
                    return acc.map(x=>x.cnt?Math.round(x.sum/x.cnt):0);
                };
                const aAvg=getAvgByDow(agg.daily);
                const bAvg=getAvgByDow(prevAgg.daily);
                this._pbiCharts.line=new Chart(ctx,{type:'bar',data:{labels:dayNames,datasets:[
                    {label:'🔵 A (เฉลี่ย/วัน)',data:aAvg,backgroundColor:'#0078d4bb',borderColor:'#0078d4',borderWidth:1,borderRadius:4},
                    {label:'🟠 B (เฉลี่ย/วัน)',data:bAvg,backgroundColor:'#d07000bb',borderColor:'#d07000',borderWidth:1,borderRadius:4}
                ]},options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{display:true,labels:{font:{size:10}}},tooltip:{callbacks:{label:c=>{const lbl=mode==='orders'?` ${Math.round(c.parsed.y).toLocaleString()} ออเดอร์`:`฿${Math.round(c.parsed.y).toLocaleString()}`;return`${c.dataset.label}: ${lbl}`;},title:t=>`วัน${t[0].label}`}}},scales:{x:{ticks:{font:{size:10}},grid:{display:false}},y:{ticks:{font:{size:9},callback:v=>mode==='orders'?v:'฿'+Math.round(v).toLocaleString()},grid:{color:'#F0FDFA'}}}}});
            } else {
                // Normal mode — filter by selected trend month/year
                const tY=this.state.trendYear;
                const tM=this.state.trendMonth;
                const tKey=`${tY}-${tM}`;
                const trendOrders=this.state.orders.filter(o=>{
                    const d=new Date(o.timestamp);
                    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`===tKey;
                });
                const trendAgg=this.aggregateDashboardData(trendOrders);
                const trendDaily=trendAgg.daily;
                const labels=trendDaily.map(d=>new Date(d.date+'T12:00:00').toLocaleDateString('th-TH',{day:'numeric',month:'short'}));
                const data=trendDaily.map(d=>mode==='profit'?d.profit:mode==='orders'?d.orders:d.rev);
                const thMonthNames=['','ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
                const chartTitle=`${thMonthNames[parseInt(tM)]} ${parseInt(tY)+543}`;
                // แสดง label เฉพาะวันที่ 1, 8, 15, 22, 29 — แสดง 2 เส้นพร้อมกัน (ยอดขาย + กำไร) หรือเส้นเดียวถ้าเลือก ออเดอร์
                const weeklyDays=[1,8,15,22,29];
                const tickCb=function(_val,i){const d=trendDaily[i];if(!d)return'';const day=new Date(d.date+'T12:00:00').getDate();return weeklyDays.includes(day)?labels[i]:'';};
                const datasets3=mode==='orders'
                  ?[{label:'ออเดอร์',data:trendDaily.map(d=>d.orders),borderColor:'#8764b8',backgroundColor:'#8764b815',fill:true,tension:.35,pointRadius:3,pointHoverRadius:6,borderWidth:2.5,borderDash:[]}]
                  :mode==='profit'
                  ?[{label:'กำไร',data:trendDaily.map(d=>d.profit),borderColor:'#107c10',backgroundColor:'#107c1015',fill:true,tension:.35,pointRadius:3,pointHoverRadius:6,borderWidth:2,borderDash:[5,4],yAxisID:'y2'}]
                  :[{label:'ยอดขาย',data:trendDaily.map(d=>d.rev),borderColor:'#0078d4',backgroundColor:'#0078d415',fill:true,tension:.35,pointRadius:3,pointHoverRadius:6,borderWidth:2.5,yAxisID:'y'}];
                this._pbiCharts.line=new Chart(ctx,{type:'line',data:{labels,datasets:datasets3},options:{responsive:true,maintainAspectRatio:true,interaction:{mode:'index',intersect:false},plugins:{legend:{display:true,labels:{font:{size:10},usePointStyle:true,pointStyleWidth:20}},tooltip:{callbacks:{title:t=>`📅 ${t[0].label}`,label:c=>mode==='orders'?`  ${Math.round(c.parsed.y).toLocaleString()} ออเดอร์`:`  ${c.dataset.label}: ฿${Math.round(c.parsed.y).toLocaleString()}`}}},scales:{x:{ticks:{font:{size:10},autoSkip:false,maxRotation:0,minRotation:0,callback:tickCb},grid:{display:false}},y:{display:mode!=='profit',ticks:{font:{size:9},callback:v=>mode==='orders'?v:'฿'+Math.round(v).toLocaleString()},grid:{color:'#F0FDFA'}},y2:{display:mode==='profit',position:'right',min:0,max:10000,ticks:{font:{size:9},stepSize:2500,callback:v=>'฿'+Math.round(v).toLocaleString()},grid:{color:'#F0FDFA'}}}}});
                // Bind dropdown events
                const mSel=document.getElementById('trend-month-sel');
                const ySel=document.getElementById('trend-year-sel');
                if(mSel)mSel.addEventListener('change',e=>{this.state.trendMonth=e.target.value;requestAnimationFrame(()=>this.initDashboardCharts());});
                if(ySel)ySel.addEventListener('change',e=>{this.state.trendYear=e.target.value;requestAnimationFrame(()=>this.initDashboardCharts());});
            }
        }
        const donutEl=document.getElementById('pbiDonutChart');
        if(donutEl){
            const renderDonut=()=>{
                const dMode=this._pbiDonutMode||'rev';
                const dSelMonth=this._donutSelMonth||'all';
                const dSelYear=this._donutSelYear||'all';
                const dOrders=this.state.orders.filter(o=>{
                    const d=new Date(o.timestamp);
                    const oY=String(d.getFullYear());
                    const oM=String(d.getMonth()+1).padStart(2,'0');
                    if(dSelYear!=='all'&&oY!==dSelYear)return false;
                    if(dSelMonth!=='all'&&oM!==dSelMonth)return false;
                    return true;
                });
                const dCatMap={};
                dOrders.forEach(o=>o.items.forEach(item=>{const ck=item.category;if(!dCatMap[ck])dCatMap[ck]={name:this.getCategoryName(ck),rev:0,qty:0,profit:0,color:({coffee:'#0078d4',tea:'#107c10',softdrink:'#d83b01',bakery:'#8764b8',promotion:'#f2a500',other:'#8a8886'})[ck]||'#ccc'};dCatMap[ck].rev+=item.price*item.quantity;dCatMap[ck].qty+=item.quantity;dCatMap[ck].profit+=(item.price-item.cost)*item.quantity;}));
                const dCats=Object.values(dCatMap).sort((a,b)=>b[dMode]-a[dMode]);
                const dTotal=dCats.reduce((s,c)=>s+(dMode==='qty'?c.qty:dMode==='profit'?c.profit:c.rev),0);
                // update chart
                if(this._pbiCharts.donut){try{this._pbiCharts.donut.destroy();}catch(e){}}
                const ctx=donutEl.getContext('2d');
                this._pbiCharts.donut=new Chart(ctx,{type:'doughnut',data:{labels:dCats.map(c=>c.name),datasets:[{data:dCats.map(c=>dMode==='qty'?c.qty:dMode==='profit'?c.profit:c.rev),backgroundColor:dCats.map(c=>c.color),borderWidth:2,borderColor:'white'}]},options:{responsive:false,plugins:{legend:{display:false}}}});
                // update legend HTML
                const legendEl=document.getElementById('donut-legend');
                if(legendEl){legendEl.innerHTML=dCats.map(c=>{const val=dMode==='qty'?c.qty:dMode==='profit'?c.profit:c.rev;const pct=dTotal>0?(val/dTotal*100).toFixed(1):0;return`<div class="dl-row"><div class="dl-dot" style="background:${c.color}"></div><div style="font-size:11px;flex:1">${c.name}</div><div style="font-size:11px;font-weight:700">${dMode==='qty'?Math.round(val).toLocaleString()+' ชิ้น':'฿'+Math.round(val).toLocaleString()}</div><div style="font-size:10px;color:#888;min-width:35px;text-align:right">${pct}%</div></div>`;}).join('');}
            };
            renderDonut();
            // Bind mode buttons (ยอดขาย/จำนวน/กำไร)
            document.querySelectorAll('[data-donut-mode]').forEach(btn=>btn.addEventListener('click',e=>{
                this._pbiDonutMode=e.currentTarget.dataset.donutMode;
                document.querySelectorAll('[data-donut-mode]').forEach(b=>b.classList.toggle('active',b===e.currentTarget));
                renderDonut();
            }));
            // Bind month dropdown (independent)
            const donutMonthSel=document.getElementById('donut-month-sel');
            if(donutMonthSel)donutMonthSel.addEventListener('change',e=>{
                this._donutSelMonth=e.target.value;
                renderDonut();
            });
            // Bind year dropdown (independent)
            const donutYearSel=document.getElementById('donut-year-sel');
            if(donutYearSel)donutYearSel.addEventListener('change',e=>{
                this._donutSelYear=e.target.value;
                renderDonut();
            });
        }
        const barEl=document.getElementById('pbiBarChart');
        if(barEl){
            const renderDailyBar=(targetDate)=>{
                // ดึง orders ทั้งหมด (ไม่ filter period) สำหรับกราฟรายวัน
                const allOrd=this.state.orders;
                // หาวันที่มีข้อมูลทั้งหมด (unique sorted)
                const allDates=[...new Set(allOrd.map(o=>o.timestamp.split('T')[0]))].sort();
                if(!allDates.length)return;
                // ตรวจว่า targetDate อยู่ใน range
                const clampedDate=allDates.includes(targetDate)?targetDate:(allDates[allDates.length-1]||targetDate);
                if(this.state.dailyBarDate!==clampedDate){this.state.dailyBarDate=clampedDate;}
                // filter orders ของวันนั้น
                const dayOrders=allOrd.filter(o=>o.timestamp.split('T')[0]===clampedDate);
                // คำนวณ per-hour breakdown
                const hourMap={};dayOrders.forEach(o=>{const h=new Date(o.timestamp).getHours();if(!hourMap[h])hourMap[h]={rev:0,profit:0,orders:0};hourMap[h].rev+=o.total;hourMap[h].profit+=o.profit;hourMap[h].orders++;});
                const hrs=Object.keys(hourMap).map(Number).sort((a,b)=>a-b);
                const labels=hrs.map(h=>`${String(h).padStart(2,'0')}:00`);
                const revData=hrs.map(h=>hourMap[h].rev);
                const profData=hrs.map(h=>hourMap[h].profit);
                // summary bar
                const sumEl=document.getElementById('daily-bar-summary');
                if(sumEl){
                    const totRev=dayOrders.reduce((s,o)=>s+o.total,0);
                    const totProf=dayOrders.reduce((s,o)=>s+o.profit,0);
                    const totOrd=dayOrders.length;
                    const thDate=new Date(clampedDate+'T12:00:00').toLocaleDateString('th-TH',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
                    sumEl.innerHTML=!dayOrders.length
                        ?`<span style="font-size:11px;color:#aaa">ไม่มีข้อมูลวันนี้</span>`
                        :`<span style="font-size:11px;background:#E0F7FA;color:#007c70;padding:3px 10px;border-radius:20px">📅 ${thDate}</span><span style="font-size:11px;background:#dff6dd;color:#107c10;padding:3px 10px;border-radius:20px">💰 ฿${Math.round(totRev).toLocaleString()}</span><span style="font-size:11px;background:#e8f4fd;color:#0078d4;padding:3px 10px;border-radius:20px">📈 กำไร ฿${Math.round(totProf).toLocaleString()}</span><span style="font-size:11px;background:#f3f2f1;color:#666;padding:3px 10px;border-radius:20px">🧾 ${totOrd} ออเดอร์</span>`;
                }
                // update date input value (sync before drawing chart)
                const diInner=document.getElementById('daily-bar-date');if(diInner)diInner.value=clampedDate;
                // destroy old chart
                if(this._pbiCharts.bar){try{this._pbiCharts.bar.destroy();}catch(e){}}
                if(!dayOrders.length){barEl.style.display='none';return;}
                barEl.style.display='';
                const ctx2=barEl.getContext('2d');
                this._pbiCharts.bar=new Chart(ctx2,{type:'bar',data:{labels,datasets:[
                    {label:'ยอดขาย',data:revData,backgroundColor:'#ef444455',borderColor:'#ef4444',borderWidth:1,borderRadius:4},
                    {label:'กำไร',data:profData,backgroundColor:'#22c55e55',borderColor:'#22c55e',borderWidth:1,borderRadius:4},
                ]},options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{labels:{font:{size:9}}},tooltip:{callbacks:{label:c=>`${c.dataset.label}: ฿${Math.round(c.parsed.y).toLocaleString()}`}}},scales:{x:{ticks:{font:{size:9}},grid:{display:false}},y:{ticks:{font:{size:9},callback:v=>'฿'+Math.round(v).toLocaleString()},grid:{color:'#F0FDFA'}}}}});
            };
            // Fix: resolve the effective start date (clamp to latest date with data if today has no data)
            const allOrd2=this.state.orders;
            const allDates2=[...new Set(allOrd2.map(o=>o.timestamp.split('T')[0]))].sort();
            const todayStr=new Date().toISOString().split('T')[0];
            // If current dailyBarDate has no data, auto-jump to the latest date that has data
            const effectiveStartDate=(()=>{
                if(allDates2.includes(this.state.dailyBarDate))return this.state.dailyBarDate;
                return allDates2.length?allDates2[allDates2.length-1]:this.state.dailyBarDate;
            })();
            if(this.state.dailyBarDate!==effectiveStartDate){this.state.dailyBarDate=effectiveStartDate;}
            renderDailyBar(effectiveStartDate);
            // bind date input
            const di=document.getElementById('daily-bar-date');
            if(di){di.value=this.state.dailyBarDate;di.addEventListener('change',e=>{this.state.dailyBarDate=e.target.value;renderDailyBar(e.target.value);});}
            // bind prev/next/today buttons
            const prevBtn=document.getElementById('daily-bar-prev');
            const nextBtn=document.getElementById('daily-bar-next');
            const todayBtn=document.getElementById('daily-bar-today');
            if(prevBtn)prevBtn.addEventListener('click',()=>{
                const cur=this.state.dailyBarDate;
                const allD=[...new Set(this.state.orders.map(o=>o.timestamp.split('T')[0]))].sort();
                const idx=allD.indexOf(cur);
                const newDate=idx>0?allD[idx-1]:(()=>{const d=new Date(cur);d.setDate(d.getDate()-1);return d.toISOString().split('T')[0];})();
                this.state.dailyBarDate=newDate;renderDailyBar(newDate);
            });
            if(nextBtn)nextBtn.addEventListener('click',()=>{
                const cur=this.state.dailyBarDate;
                const allD=[...new Set(this.state.orders.map(o=>o.timestamp.split('T')[0]))].sort();
                const idx=allD.indexOf(cur);
                const newDate=(idx>=0&&idx<allD.length-1)?allD[idx+1]:(()=>{const d=new Date(cur);d.setDate(d.getDate()+1);return d.toISOString().split('T')[0];})();
                this.state.dailyBarDate=newDate;renderDailyBar(newDate);
            });
            if(todayBtn)todayBtn.addEventListener('click',()=>{
                const allD=[...new Set(this.state.orders.map(o=>o.timestamp.split('T')[0]))].sort();
                const target=allD.includes(todayStr)?todayStr:(allD.length?allD[allD.length-1]:todayStr);
                this.state.dailyBarDate=target;renderDailyBar(target);
            });
        }
        const timeEl=document.getElementById('pbiTimeChart');
        if(timeEl){const ctx=timeEl.getContext('2d');const hrs=Array.from({length:24},(_,h)=>h);const data=hrs.map(h=>{const f=agg.hourly.find(x=>x.hour===h);return f?f.orders:0;});const datasets2=[{label:'ออเดอร์ (A)',data,backgroundColor:data.map(v=>v===Math.max(...data)?'#00BFA5':'#e0ddd8'),borderRadius:4}];if(prevAgg&&prevAgg.hourly.length){const prevData=hrs.map(h=>{const f=prevAgg.hourly.find(x=>x.hour===h);return f?f.orders:0;});datasets2.push({label:'ออเดอร์ (B)',data:prevData,backgroundColor:'#d0700055',borderRadius:4});}this._pbiCharts.time=new Chart(ctx,{type:'bar',data:{labels:hrs.map(h=>`${String(h).padStart(2,'0')}:00`),datasets:datasets2},options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{display:datasets2.length>1,labels:{font:{size:9}}}},scales:{x:{ticks:{font:{size:8},maxTicksLimit:12},grid:{display:false}},y:{ticks:{font:{size:9},stepSize:1},grid:{color:'#F0FDFA'}}}}});}
