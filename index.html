    // ==================== DEMO DATA GENERATOR ====================
    generateDemoData(){const[minOrders,maxOrders]=this.state.demoOrdersPerDay.split('-').map(Number);const months=this.state.demoMonths;const usePeak=this.state.demoPeakHour;const coffeeP=this.products.filter(p=>p.category==='coffee');const teaP=this.products.filter(p=>p.category==='tea');const softP=this.products.filter(p=>p.category==='softdrink');const bakeryP=this.products.filter(p=>p.category==='bakery');const otherP=this.products.filter(p=>p.category==='other'&&!p.isAddon);const promoP=this.products.filter(p=>p.category==='promotion');const allDrinks=[...coffeeP,...teaP,...softP];const allFood=[...bakeryP,...otherP,...promoP];const topDrinks=['ลาเต้ เย็น','คาปูชิโน่ เย็น','อเมริกาโน่ เย็น','ชาไทย เย็น','มอคค่า เย็น','ชาเขียวมัทฉะ เย็น','ส้มสมูทตี้'];const topFood=['ขนมปังปิ้งเนย+นม','เค้กช็อคโกแลต','แซนวิชแฮมชีส','คุกกี้ชิ้นใหญ่','วาฟเฟิล'];function wPool(items,tops){const p=[];items.forEach(i=>{const w=tops.includes(i.name)?4:1;for(let x=0;x<w;x++)p.push(i);});return p;}const drinkPool=wPool(allDrinks,topDrinks);const foodPool=wPool(allFood,topFood);function rand(min,max){return Math.floor(Math.random()*(max-min+1))+min;}function pick(arr){return arr[rand(0,arr.length-1)];}const sweets=[0,25,50,75,100];function rSweet(){return sweets[rand(0,sweets.length-1)];}const peakHours=usePeak?[7,8,9,11,12,13,15,16,17]:Array.from({length:14},(_,i)=>i+7);const newOrders=[];let totalGenerated=0;const startDate=new Date();startDate.setMonth(startDate.getMonth()-months);startDate.setHours(0,0,0,0);const currentDate=new Date(startDate);while(currentDate<=new Date()){const numOrders=rand(minOrders,maxOrders);for(let j=0;j<numOrders;j++){const orderTime=new Date(currentDate);const h=pick(peakHours);orderTime.setHours(h,rand(0,59),rand(0,59),0);const itemCount=rand(1,3);const items=[];for(let k=0;k<itemCount;k++){const isDrinkItem=Math.random()<.7;const product=isDrinkItem?pick(drinkPool):pick(foodPool);const qty=Math.random()<.85?1:2;let oi={...product,quantity:qty};if(product.isDrink){const sw=rSweet();oi.originalName=product.name;oi.name=`${product.name} (${sw}%)`;oi.sweetness=sw;}if(product.isDrink&&product.category==='coffee'&&Math.random()<.15){oi.extraShots=1;oi.price=product.price+10;}const ei=items.findIndex(it=>it.name===oi.name);if(ei>=0)items[ei].quantity+=qty;else items.push(oi);}const sub=items.reduce((s,it)=>s+it.price*it.quantity,0);const tc=items.reduce((s,it)=>s+it.cost*it.quantity,0);const disc=(sub*10)/100;const vat=(sub-disc)*.07;const tot=sub-disc+vat;const prof=tot-tc;newOrders.push({id:orderTime.getTime()+rand(0,999),timestamp:orderTime.toISOString(),items,subtotal:sub,totalCost:tc,discount:disc,vat,total:tot,profit:prof,staffName:'Demo'});totalGenerated++;}currentDate.setDate(currentDate.getDate()+1);}newOrders.sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));this._clearIDB();this.state.orders=newOrders;this._saveBatch(newOrders);this.state.showDemoGenerator=false;const tRev=newOrders.reduce((s,o)=>s+o.total,0);const tProf=newOrders.reduce((s,o)=>s+o.profit,0);alert(`✅ สร้างข้อมูลจำลองสำเร็จ!\n\n📊 ${totalGenerated.toLocaleString()} ออเดอร์\n💰 ยอดขาย ฿${tRev.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,',')}\n📈 กำไร ฿${tProf.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,',')}\n\n${this.state.supabaseUrl?'☁️ กำลัง sync ขึ้น Supabase...\n(เครื่องอื่นจะได้ข้อมูลภายใน 1-2 นาที)':''}`);this.render();
        // Sync demo data to Supabase in batches
        if(this.state.supabaseUrl&&this.state.supabaseKey){
            this._syncDemoBatch(newOrders,0);
        }
    }

    // Sync demo orders to Supabase in batches of 50
    async _syncDemoBatch(orders, offset) {
        const BATCH=50;
        const slice=orders.slice(offset,offset+BATCH);
        if(!slice.length) { console.log('[Demo Sync] อัปโหลดครบแล้ว!'); return; }
        const body=slice.map(o=>({id:o.id,timestamp:o.timestamp,items:o.items,subtotal:o.subtotal,total_cost:o.totalCost,discount:o.discount,vat:o.vat,total:o.total,profit:o.profit,staff_id:o.staffId||'',staff_name:o.staffName||'',payment_method:o.paymentMethod||'cash'}));
        await this._supaFetch('orders',{method:'POST',headers:{'Prefer':'resolution=merge-duplicates'},body:JSON.stringify(body)});
        console.log(`[Demo Sync] อัปโหลดแล้ว ${Math.min(offset+BATCH,orders.length)}/${orders.length}`);
        setTimeout(()=>this._syncDemoBatch(orders,offset+BATCH),300);
    }

        });
        const removeLogoBtn = document.getElementById('remove-logo-btn');
        if (removeLogoBtn) removeLogoBtn.addEventListener('click', () => { this._pendingLogo = null; this.shopLogo = null; localStorage.removeItem('pos_shop_logo'); this.render(); });
        // Settings toggle
        const stog=document.getElementById('settings-toggle');
        if(stog)stog.addEventListener('click',()=>{this.state.settingsOpen=!this.state.settingsOpen;const menu=document.getElementById('settings-menu');const arrow=document.getElementById('settings-arrow');if(menu)menu.style.maxHeight=this.state.settingsOpen?'300px':'0px';if(arrow)arrow.style.transform=this.state.settingsOpen?'rotate(180deg)':'rotate(0deg)';});
        // Settings modal tabs
        document.querySelectorAll('[data-settings-tab]').forEach(el=>el.addEventListener('click',e=>{this.state.settingsTab=e.currentTarget.dataset.settingsTab;this.render();}));
        document.querySelectorAll('.close-settings').forEach(b=>b.addEventListener('click',()=>{this.state.showSettings=false;this.render();}));
        const sv=document.querySelector('.save-settings');if(sv)sv.addEventListener('click',()=>{
            const u=document.getElementById('google-sheet-url').value;this.state.googleSheetUrl=u;localStorage.setItem('googleSheetUrl',u);this.syncConfigToSupabase('google_sheet_url',u);
            const ae=document.getElementById('auto-export-toggle');if(ae){this.state.autoExportSheets=ae.checked;localStorage.setItem('autoExportSheets',ae.checked);this.syncConfigToSupabase('auto_export_sheets',String(ae.checked));}
            this.state.showSettings=false;alert(`✅ บันทึกเรียบร้อย!`);this.render();
        });
        const ae=document.getElementById('auto-export-toggle');if(ae)ae.addEventListener('change',e=>{this.state.autoExportSheets=e.target.checked;localStorage.setItem('autoExportSheets',e.target.checked);});
        const tb=document.querySelector('.test-sheets-btn');if(tb)tb.addEventListener('click',async()=>{if(!this.state.googleSheetUrl){alert('⚠️ ใส่ URL ก่อน');return;}try{const now=new Date();await fetch(this.state.googleSheetUrl,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({data:[{date:now.toLocaleDateString('th-TH'),time:now.toLocaleTimeString('th-TH'),category:'TEST',item:'🧪 ทดสอบ',quantity:1,price:0,cost:0,subtotal:'0',discount:'0',vat:'0',total:'0',profit:'0',staff:'test'}],month:'test'})});alert('✅ ส่งสำเร็จ! เปิด Google Sheet ตรวจสอบ');}catch(e){alert('❌ '+e.message);}});
        const ssv=document.querySelector('.save-supabase');if(ssv)ssv.addEventListener('click',async()=>{
            const url=document.getElementById('supabase-url').value.trim();
            const key=document.getElementById('supabase-key').value.trim();
            if(!url||!key){alert('⚠️ กรุณากรอก URL และ Key ให้ครบ');return;}
            this.state.supabaseUrl=url;this.state.supabaseKey=key;
            localStorage.setItem('supabaseUrl',url);localStorage.setItem('supabaseKey',key);
            this.state.showSettings=false;this.render();
            await this.loadFromSupabase();
            this.startRealtimeSync();
            this.startPolling();
            alert('☁️ เชื่อมต่อ Supabase สำเร็จ!\n✅ ซิงค์ข้อมูลอัตโนมัติแบบ Realtime แล้ว');
        });
        // User management
        const cum=document.querySelector('.close-user-mgmt');if(cum)cum.addEventListener('click',()=>{this.state.showUserMgmt=false;this.state.showAddUser=false;this.render();});
        const aub=document.querySelector('.add-user-btn');if(aub)aub.addEventListener('click',()=>{this.state.showAddUser=true;this.render();});
        const cau=document.querySelector('.cancel-add-user');if(cau)cau.addEventListener('click',()=>{this.state.showAddUser=false;this.render();});
        const cfu=document.querySelector('.confirm-add-user');if(cfu)cfu.addEventListener('click',()=>{
            const un=document.getElementById('new-username')?.value?.trim();const pw=document.getElementById('new-password')?.value?.trim();const nm=document.getElementById('new-name')?.value?.trim();const rl=document.getElementById('new-role')?.value;
            if(!un||!pw||!nm){alert('⚠️ กรุณากรอกข้อมูลให้ครบ');return;}
            if(this.auth.users.find(u=>u.username===un)){alert('⚠️ มี Username นี้แล้ว');return;}
            this.auth.addUser({username:un,password:pw,name:nm,role:rl,active:true});this.state.showAddUser=false;this.render();
        });
        document.querySelectorAll('.delete-user-btn').forEach(el=>el.addEventListener('click',e=>{const uid=parseInt(e.currentTarget.dataset.deleteUser);if(confirm('ยืนยันลบผู้ใช้นี้?')){this.auth.deleteUser(uid);this.render();}}));
        // Image management
        const cim=document.querySelector('.close-image-mgmt');if(cim)cim.addEventListener('click',()=>{this.state.showImageMgmt=false;this.state.imageProduct=null;this.render();});
        const pib=document.querySelector('.pick-img-btn');if(pib)pib.addEventListener('click',()=>document.getElementById('img-file-input')?.click());
        const dz=document.getElementById('img-drop-zone');if(dz)dz.addEventListener('click',()=>document.getElementById('img-file-input')?.click());
        const fi=document.getElementById('img-file-input');if(fi)fi.addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;if(f.size>10*1024*1024){alert('⚠️ ไฟล์ใหญ่เกิน 10MB');return;}const r=new FileReader();r.onload=async ev=>{const compressed=await this.compressImage(ev.target.result);this.setProductImage(this.state.imageProduct.id,compressed);this.state.showImageMgmt=false;this.state.imageProduct=null;this.render();};r.readAsDataURL(f);});
        const rib=document.querySelector('.remove-img-btn');if(rib)rib.addEventListener('click',()=>{if(confirm('ลบรูปภาพนี้?')){this.removeProductImage(this.state.imageProduct.id);this.state.showImageMgmt=false;this.state.imageProduct=null;this.render();}});
        // Reports
        document.querySelectorAll('[data-tab]').forEach(el=>el.addEventListener('click',e=>{this.state.reportTab=e.currentTarget.dataset.tab;this.render();}));
        const mf=document.getElementById('month-filter');if(mf)mf.addEventListener('change',e=>{this.state.selectedMonth=e.target.value;this.render();});
        // Dashboard
        document.querySelectorAll('[data-dash-sub]').forEach(el=>el.addEventListener('click',e=>{this.state.dashSubTab=e.currentTarget.dataset.dashSub;this.render();}));
        document.querySelectorAll('[data-dash-period]').forEach(el=>el.addEventListener('click',e=>{this.state.dashPeriod=e.currentTarget.dataset.dashPeriod;this.render();}));
        const dd=document.getElementById('dash-date');if(dd)dd.addEventListener('change',e=>{this.state.dashDate=e.target.value;this.render();});
        const dd2=document.getElementById('dash-date2');if(dd2)dd2.addEventListener('change',e=>{this.state.dashDate2=e.target.value;this.render();});
        const dw=document.getElementById('dash-week');if(dw)dw.addEventListener('change',e=>{this.state.dashWeekOffset=parseInt(e.target.value);this.render();});
        const dw2=document.getElementById('dash-week2');if(dw2)dw2.addEventListener('change',e=>{this.state.dashWeekOffset2=parseInt(e.target.value);this.render();});
        const dm=document.getElementById('dash-month');if(dm)dm.addEventListener('change',e=>{this.state.dashMonthKey=e.target.value;this.render();});
        const dm2=document.getElementById('dash-month2');if(dm2)dm2.addEventListener('change',e=>{this.state.dashMonthKey2=e.target.value;this.render();});
        const dy=document.getElementById('dash-year');if(dy)dy.addEventListener('change',e=>{this.state.dashYear=e.target.value;this.render();});
        const dy2=document.getElementById('dash-year2');if(dy2)dy2.addEventListener('change',e=>{this.state.dashYear2=e.target.value;this.render();});
        const dc=document.getElementById('dash-compare');if(dc)dc.addEventListener('change',e=>{this.state.dashCompare=e.target.checked;this.render();});
        document.querySelectorAll('.dash-nav').forEach(el=>el.addEventListener('click',e=>{const nav=e.currentTarget.dataset.dashNav;if(nav==='prev-day'){const d=new Date(this.state.dashDate);d.setDate(d.getDate()-1);this.state.dashDate=d.toISOString().split('T')[0];}if(nav==='next-day'){const d=new Date(this.state.dashDate);d.setDate(d.getDate()+1);this.state.dashDate=d.toISOString().split('T')[0];}if(nav==='today')this.state.dashDate=new Date().toISOString().split('T')[0];this.render();}));
        document.querySelectorAll('[data-dtop-cat]').forEach(el=>el.addEventListener('click',e=>{this.state.dashTopCat=e.currentTarget.dataset.dtopCat;this.render();}));
        document.querySelectorAll('[data-line-mode]').forEach(el=>el.addEventListener('click',e=>{this._pbiLineMode=e.currentTarget.dataset.lineMode;e.currentTarget.parentElement.querySelectorAll('.pbi-abtn').forEach(b=>b.classList.remove('active'));e.currentTarget.classList.add('active');this.initDashboardCharts();}));
        // [data-donut-mode] and [data-donut-period] are bound inside initDashboardCharts()
        // Export
        document.querySelectorAll('[data-export-period]').forEach(el=>el.addEventListener('click',e=>{this.state.exportPeriod=e.currentTarget.dataset.exportPeriod;this.render();}));
        const ed=document.getElementById('export-date');if(ed)ed.addEventListener('change',e=>{this.state.exportDate=e.target.value;this.render();});
        const ew=document.getElementById('export-week');if(ew)ew.addEventListener('change',e=>{this.state.exportWeek=e.target.value;this.render();});
        const em=document.getElementById('export-month');if(em)em.addEventListener('change',e=>{this.state.exportMonth=e.target.value;this.render();});
        const ey=document.getElementById('export-year');if(ey)ey.addEventListener('change',e=>{this.state.exportYear=e.target.value;this.render();});
        document.querySelectorAll('.date-nav-btn').forEach(el=>el.addEventListener('click',e=>{const nav=e.currentTarget.dataset.dateNav;const d=new Date(this.state.exportDate+'T00:00:00');if(nav==='prev')d.setDate(d.getDate()-1);else if(nav==='next')d.setDate(d.getDate()+1);else d.setTime(new Date().getTime());this.state.exportDate=d.toISOString().split('T')[0];this.render();}));
        const epc=document.querySelector('.export-period-csv');if(epc)epc.addEventListener('click',()=>this.exportPeriodCSV());
        const eps=document.querySelector('.export-period-sheets');if(eps)eps.addEventListener('click',()=>this.exportPeriodSheets());
        // Demo modal
        document.querySelectorAll('.close-demo').forEach(b=>b.addEventListener('click',()=>{this.state.showDemoGenerator=false;this.render();}));
        document.querySelectorAll('[data-demo-months]').forEach(el=>el.addEventListener('click',e=>{this.state.demoMonths=parseInt(e.currentTarget.dataset.demoMonths);this.render();}));
        document.querySelectorAll('[data-demo-orders]').forEach(el=>el.addEventListener('click',e=>{this.state.demoOrdersPerDay=e.currentTarget.dataset.demoOrders;this.render();}));
        const dp=document.getElementById('demo-peak');if(dp)dp.addEventListener('change',e=>{this.state.demoPeakHour=e.target.checked;this.render();});
        const gb=document.querySelector('.generate-demo-btn');if(gb)gb.addEventListener('click',()=>this.generateDemoData());

        // Discount input
        const discInput=document.getElementById('discount-input');
        if(discInput){
            discInput.addEventListener('input',e=>{let v=parseFloat(e.target.value)||0;v=Math.min(100,Math.max(0,v));this.state.discount=v;this.render();});
            discInput.addEventListener('blur',e=>{let v=parseFloat(e.target.value)||0;this.state.discount=Math.min(100,Math.max(0,v));this.render();});
        }
        const discDec=document.getElementById('disc-dec');if(discDec)discDec.addEventListener('click',()=>{this.state.discount=Math.max(0,this.state.discount-5);this.render();});
        const discInc=document.getElementById('disc-inc');if(discInc)discInc.addEventListener('click',()=>{this.state.discount=Math.min(100,this.state.discount+5);this.render();});

        // Payment method
        document.querySelectorAll('.pay-method-btn').forEach(el=>el.addEventListener('click',e=>{this.state.paymentMethod=e.currentTarget.dataset.pay;this.render();}));

        // Edit user
        document.querySelectorAll('.edit-user-btn').forEach(el=>el.addEventListener('click',e=>{
            const uid=parseInt(e.currentTarget.dataset.editUser);
            const u=this.auth.users.find(x=>x.id===uid);
            if(u){this.state.editUserId=uid;this.state.editUserData={...u};this.state.showAddUser=false;this.render();}
        }));
        const ceu=document.querySelector('.cancel-edit-user');if(ceu)ceu.addEventListener('click',()=>{this.state.editUserId=null;this.state.editUserData=null;this.render();});
        const cfeu=document.querySelector('.confirm-edit-user');if(cfeu)cfeu.addEventListener('click',()=>{
            const nm=document.getElementById('edit-name')?.value?.trim();
            const un=document.getElementById('edit-username')?.value?.trim();
            const pw=document.getElementById('edit-password')?.value?.trim();
            const rl=document.getElementById('edit-role')?.value;
            if(!nm||!un){alert('⚠️ กรุณากรอกชื่อและ Username');return;}
            const uid=this.state.editUserId;
            const dupl=this.auth.users.find(u=>u.username===un&&u.id!==uid);
            if(dupl){alert('⚠️ Username นี้มีผู้ใช้แล้ว');return;}
            const upd={name:nm,username:un,role:rl};
            if(pw)upd.password=pw;
            this.auth.updateUser(uid,upd);
            // Update session if editing self
            if(this.auth.currentUser?.id===uid){const updated=this.auth.users.find(u=>u.id===uid);this.auth.currentUser={...updated};sessionStorage.setItem('pos_user',JSON.stringify(this.auth.currentUser));}
            this.state.editUserId=null;this.state.editUserData=null;this.render();
            alert('✅ แก้ไขข้อมูลผู้ใช้สำเร็จ!');
        });

        // Product management
        const pmb=document.querySelector('.product-mgmt-btn');if(pmb)pmb.addEventListener('click',()=>{this.state.showProductMgmt=true;this.state.showAddProduct=false;this.state.editProductId=null;this.render();});
        const cpm=document.querySelector('.close-product-mgmt');if(cpm)cpm.addEventListener('click',()=>{this.state.showProductMgmt=false;this.state.showAddProduct=false;this.state.editProductId=null;this.render();});
        const apb=document.querySelector('.add-product-btn');if(apb)apb.addEventListener('click',()=>{this.state.showAddProduct=true;this.state.editProductId=null;this.render();});
        const cpb=document.querySelector('.cancel-prod-btn');if(cpb)cpb.addEventListener('click',()=>{this.state.showAddProduct=false;this.state.editProductId=null;this.render();});
        const rpb=document.querySelector('.reset-products-btn');if(rpb)rpb.addEventListener('click',()=>{if(confirm('รีเซ็ตสินค้ากลับเป็นค่าเริ่มต้น?')){localStorage.removeItem('pos_products_custom');location.reload();}});
        // Emoji picker in product modal
        document.querySelectorAll('.emoji-pick-btn').forEach(el=>el.addEventListener('click',e=>{const emoji=e.currentTarget.dataset.emoji;const inp=document.getElementById('prod-emoji');if(inp)inp.value=emoji;document.querySelectorAll('.emoji-pick-btn').forEach(b=>b.classList.remove('border-teal-500','bg-teal-50'));e.currentTarget.classList.add('border-teal-500','bg-teal-50');}));
        // Confirm add/edit product
        const confpb=document.querySelector('.confirm-prod-btn');if(confpb)confpb.addEventListener('click',()=>{
            const name=document.getElementById('prod-name')?.value?.trim();
            const price=parseFloat(document.getElementById('prod-price')?.value);
            const cost=parseFloat(document.getElementById('prod-cost')?.value)||0;
            const cat=document.getElementById('prod-cat')?.value;
            const image=document.getElementById('prod-emoji')?.value?.trim()||'📦';
            const isDrink=document.getElementById('prod-isdrink')?.checked||false;
            if(!name||isNaN(price)||price<0){alert('⚠️ กรุณากรอกชื่อและราคาให้ถูกต้อง');return;}
            if(this.state.editProductId){
                const idx=this.products.findIndex(p=>p.id===this.state.editProductId);
                if(idx>=0){this.products[idx]={...this.products[idx],name,price,cost,category:cat,image,isDrink};}
                this.state.editProductId=null;
            } else {
                this.products.push({id:Date.now(),name,price,cost,category:cat,image,isDrink,active:true});
                this.state.showAddProduct=false;
            }
            this.saveProducts();this.render();alert('✅ บันทึกสินค้าสำเร็จ!');
        });
        document.querySelectorAll('.edit-prod-btn').forEach(el=>el.addEventListener('click',e=>{
            const pid=parseInt(e.currentTarget.dataset.editProd);
            this.state.editProductId=pid;this.state.showAddProduct=false;this.render();
        }));
        document.querySelectorAll('.del-prod-btn').forEach(el=>el.addEventListener('click',e=>{
            const pid=parseInt(e.currentTarget.dataset.delProd);
            const p=this.products.find(x=>x.id===pid);
            if(p&&confirm(`ลบ "${p.name}"?`)){this.products=this.products.filter(x=>x.id!==pid);this.saveProducts();this.render();}
        }));
        // Edit order buttons (history tab)
        document.querySelectorAll('.edit-order-btn').forEach(el=>el.addEventListener('click',e=>{
            const oid=parseInt(e.currentTarget.dataset.editOrder);
            this.state.editOrderId=oid;
            this.state.showEditOrder=true;
            this.render();
        }));
        // Edit order modal events
        document.querySelectorAll('.close-edit-order').forEach(el=>el.addEventListener('click',()=>{this.state.showEditOrder=false;this.state.editOrderId=null;this.render();}));
        const editOverlay=document.getElementById('edit-order-overlay');
        if(editOverlay)editOverlay.addEventListener('click',e=>{if(e.target===editOverlay){this.state.showEditOrder=false;this.state.editOrderId=null;this.render();}});
        // Qty buttons inside edit order modal
        if(this.state.showEditOrder&&this.state.editOrderId){
            const o=this.state.orders.find(x=>x.id===this.state.editOrderId);
            if(o){
                const editItems=[...o.items.map(i=>({...i}))];
                const recalc=()=>{
                    const sub=editItems.reduce((s,i)=>s+i.price*i.quantity,0);
                    const vat=(sub-o.discount)*0.07;
                    const tot=sub-o.discount+vat;
                    const el_sub=document.getElementById('edit-subtotal');
                    const el_vat=document.getElementById('edit-vat');
                    const el_tot=document.getElementById('edit-total');
                    if(el_sub)el_sub.textContent='฿'+sub.toFixed(2);
                    if(el_vat)el_vat.textContent='฿'+vat.toFixed(2);
                    if(el_tot)el_tot.textContent='฿'+tot.toFixed(2);
                    document.querySelectorAll('.edit-qty-display').forEach(el=>{
                        const idx=parseInt(el.dataset.itemIdx);
                        if(editItems[idx]){el.textContent=editItems[idx].quantity;document.querySelectorAll('.edit-item-total').forEach(t=>{if(parseInt(t.dataset.itemIdx)===idx)t.textContent='฿'+(editItems[idx].price*editItems[idx].quantity).toFixed(0);});}
                    });
                };
                document.querySelectorAll('[data-qty-inc]').forEach(el=>el.addEventListener('click',e=>{const i=parseInt(e.currentTarget.dataset.qtyInc);if(editItems[i]){editItems[i].quantity++;recalc();}}));
                document.querySelectorAll('[data-qty-dec]').forEach(el=>el.addEventListener('click',e=>{const i=parseInt(e.currentTarget.dataset.qtyDec);if(editItems[i]&&editItems[i].quantity>1){editItems[i].quantity--;recalc();}}));
                document.querySelectorAll('[data-qty-del]').forEach(el=>el.addEventListener('click',e=>{
                    const i=parseInt(e.currentTarget.dataset.qtyDel);
                    editItems.splice(i,1);
                    if(!editItems.length){alert('⚠️ ต้องมีสินค้าอย่างน้อย 1 รายการ');editItems.push(...o.items.map(x=>({...x})));return;}
                    const row=e.currentTarget.closest('.flex.items-center.gap-3');if(row)row.remove();
                    recalc();
                }));
                const confirmBtn=document.querySelector('.confirm-edit-order');
                if(confirmBtn)confirmBtn.addEventListener('click',()=>{
                    if(!editItems.length){alert('⚠️ ต้องมีสินค้าอย่างน้อย 1 รายการ');return;}
                    const idx=this.state.orders.findIndex(x=>x.id===o.id);
                    if(idx>=0){
                        const sub=editItems.reduce((s,i)=>s+i.price*i.quantity,0);
                        const tc=editItems.reduce((s,i)=>s+(i.cost||0)*i.quantity,0);
                        const vat=(sub-o.discount)*0.07;
                        const tot=sub-o.discount+vat;
                        const prof=tot-tc;
                        this.state.orders[idx]={...o,items:editItems,subtotal:sub,totalCost:tc,vat,total:tot,profit:prof};
                        this.updateOrderById(this.state.orders[idx]);
                        this.syncToSupabase(this.state.orders[idx]);
                    }
                    this.state.showEditOrder=false;this.state.editOrderId=null;
                    alert('✅ แก้ไขออเดอร์สำเร็จ!');this.render();
                });
            }
        }
        const thb=document.querySelector('.today-history-btn');if(thb)thb.addEventListener('click',()=>{this.state.showTodayHistory=true;this.render();});
        const cth=document.querySelector('.close-today-history');if(cth)cth.addEventListener('click',()=>{this.state.showTodayHistory=false;this.render();});
        const overlay=document.getElementById('today-history-overlay');if(overlay)overlay.addEventListener('click',e=>{if(e.target===overlay){this.state.showTodayHistory=false;this.render();}});
        document.querySelectorAll('.void-order-btn').forEach(el=>el.addEventListener('click',e=>{
            const oid=parseInt(e.currentTarget.dataset.voidOrder);
            const o=this.state.orders.find(x=>x.id===oid);
            if(o&&confirm(`ยืนยันยกเลิกออเดอร์ #${String(oid).slice(-5)}?\n฿${o.total.toFixed(0)} — ${o.items.map(i=>i.name).join(', ')}`)){
                this.state.orders=this.state.orders.filter(x=>x.id!==oid);
                this.deleteOrderById(oid);
                this.deleteOrderFromSupabase(oid);
                this.render();
            }
        }));

        // ==================== KEYBOARD SHORTCUTS ====================
        if(!this._kbBound){
            this._kbBound=true;
            document.addEventListener('keydown',e=>{
                // Esc — close any open modal
                if(e.key==='Escape'){
                    if(this.state.showTodayHistory){this.state.showTodayHistory=false;this.render();return;}
                    if(this.state.showReceipt){this.closeReceipt();return;}
                    if(this.state.showSweetness){this.state.showSweetness=false;this.state.sweetnessProduct=null;this.render();return;}
                    if(this.state.showSettings){this.state.showSettings=false;this.render();return;}
                    if(this.state.showUserMgmt){this.state.showUserMgmt=false;this.state.showAddUser=false;this.render();return;}
                    if(this.state.showProductMgmt){this.state.showProductMgmt=false;this.state.showAddProduct=false;this.state.editProductId=null;this.render();return;}
                    if(this.state.showDemoGenerator){this.state.showDemoGenerator=false;this.render();return;}
                    if(this.state.showImageMgmt){this.state.showImageMgmt=false;this.state.imageProduct=null;this.render();return;}
                }
                // Enter — checkout (only on POS view, no modal open, cart has items, not focused on input)
                if(e.key==='Enter'){
                    const tag=document.activeElement?.tagName;
                    if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT')return;
                    const anyModal=this.state.showReceipt||this.state.showSweetness||this.state.showSettings||this.state.showUserMgmt||this.state.showProductMgmt||this.state.showDemoGenerator||this.state.showImageMgmt||this.state.showTodayHistory;
                    if(anyModal)return;
                    if(this.state.currentView==='pos'&&this.state.cart.length>0){
                        e.preventDefault();
                        this.checkout();
                    }
                }
            });
        }
    }
}

const app = new POSApp();
app.render();
</script>
</body>
</html>
